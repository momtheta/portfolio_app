<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{
  margin:0;
  font-family:Inter;
  background:#f5f7f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  padding:24px;
  border-radius:20px;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
  text-align:center;
}

h1{margin:10px 0;font-size:28px}
p{margin:4px 0;color:#666}

.green{color:#16a34a}
.red{color:#dc2626}

button{
  margin-top:16px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#16a34a;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<div class="card">
  <p>Portfolio</p>
  <h1 id="pVal">$--</h1>

  <p>Daily Gain</p>
  <h1 id="gVal">$--</h1>

  <p>Income</p>
  <h1 id="iVal">$--</h1>

  <button onclick="openApp()">Open Full Dashboard</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://yxvgevzvrvhtzmfxgitk.supabase.co",
  "sb_publishable_d2n-HOcVv50_yjKAro-eLg_WCt2kelh"
);

const API_KEY = "d7f97chr01qpjqqju8f0d7f97chr01qpjqqju8fg";

async function load(){
  const {data:{session}} = await supabase.auth.getSession();
  if(!session) return;

  const user=session.user;

  const {data} = await supabase
    .from("portfolio")
    .select("*")
    .eq("user_id", user.id);

  let total=0, income=0, gain=0;

  for(let row of data){

    let price=0;

    try{
      let r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${row.symbol}&token=${API_KEY}`);
      let d=await r.json();
      price=d.c||0;

      let change=(d.c-d.pc)||0;
      gain += change * (row.shares||0);

    }catch{}

    total += price * (row.shares||0);
    income += (row.dividend||0) * (row.shares||0);
  }

  pVal.innerText="$"+total.toFixed(0);
  iVal.innerText="$"+income.toFixed(0);

  gVal.innerText="$"+gain.toFixed(0);
  gVal.className = gain>=0 ? "green" : "red";
}

function openApp(){
  window.location.href = "https://momtheta.github.io/portfolio_app/";
}

load();
</script>

</body>
</html>
