<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f5f7f9;
  margin:0;
}

.app{
  padding:16px;
  max-width:1400px;
  margin:0 auto;
}
/* LOGIN */
.loginWrap{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:#f5f7f9;
}

.loginCard{
  max-width:420px;
  width:100%;
  background:white;
  padding:28px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.loginCard h2{
  margin:0 0 10px 0;
  font-weight:600;
  text-align:center;
}

.loginCard input{
  padding:12px 14px;
  border:1px solid #d1d5db;
  border-radius:8px;
  font-size:14px;
}

.loginCard input:focus{
  outline:none;
  border-color:#16a34a;
  box-shadow:0 0 0 2px rgba(22,163,74,0.15);
}

.loginCard button{
  padding:12px;
  background:#16a34a;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s ease;
}

.loginCard button:hover{
  background:#15803d;
}

#msg{
  font-size:13px;
  color:#dc2626;
  text-align:center;
}
/* CARDS */
.cards{display:flex;gap:10px;margin-bottom:10px;align-items:center}
.card{
  flex:1;background:#f0fdf4;
  padding:12px;border-radius:10px
}
.card h2{
  font-size:18px;
  margin:4px 0 0 0;
}
#logoutBtn{
  background:#16a34a;color:white;
  border:none;padding:10px;border-radius:8px;height:40px;
}

/* TABLE */
.tableWrap{width:100%;overflow-x:auto}

:root{
  --c1:140px; --c2:140px; --c3:140px; --c4:140px;
  --c5:140px; --c6:140px; --c7:140px; --c8:140px; --c9:140px;
}

.header,.row{
  display:grid;
  grid-template-columns:
    var(--c1) var(--c2) var(--c3) var(--c4)
    var(--c5) var(--c6) var(--c7) var(--c8) var(--c9);
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:white;
  border-bottom:2px solid #d1d5db;
}

/* CELLS */
.header > div,
.row > div{
  padding:10px;
  border-right:1px solid #e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
}

.row .sticky{
  justify-content:flex-start;
}

/* INPUT */
.row input{
  width:100%;
  border:none;
  background:transparent;
  text-align:center;
}

/* remove last border */
.header > div:last-child,
.row > div:last-child{
  border-right:none;
}

/* sticky symbol */
.sticky{
  position:sticky;
  left:0;
  background:white;
  z-index:5;
}

/* rows */
.row{background:white}
.row:hover{background:#f9fafb}

/* projection spacing */
#proj1y,#proj5y,#proj10y,#proj20y,#proj30y,#proj40y{
  display:block;
  margin-top:6px;
}

/* NET WORTH */
.netWorth{
  margin-top:20px;
  background:#f0fdf4;
  padding:16px;
  border-radius:12px;
}

/* bottom cards layout */
.bottomCards{
  display:flex;
  gap:12px;
  margin-top:20px;
  align-items:flex-start;
}

/* both cards share same look */
.netWorthCard{
  flex:0 0 auto;     /* 👈 stops stretching */
  width:220px;       /* 👈 compact width */
  background:#f0fdf4;
  padding:16px;
  border-radius:12px;
}

.projectionCard{
  flex:0 0 auto;   /* 👈 prevents stretching */
  width:280px;     /* 👈 keeps it compact */
  background:#f0fdf4;
  padding:16px;
  border-radius:12px;
}

/* inputs spacing */
.netWorthCard input{
  width:100%;
  margin-top:6px;
  padding:8px;
  font-size:13px;
  border:1px solid #d1d5db;
  border-radius:6px;
}

/* responsive (mobile) */
@media (max-width: 768px){
  .bottomCards{
    flex-direction:column;
  }
}
.projectionCard h3,
.netWorthCard h3{
  margin-top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

</style>
</head>

<body>
<div id="app">Loading...</div>

<script>
let currentRate = 0.10; // default 10%  
window.addEventListener("load", () => {

const app = document.getElementById("app");

const supabase = window.supabase.createClient(
  "https://yxvgevzvrvhtzmfxgitk.supabase.co",
  "sb_publishable_d2n-HOcVv50_yjKAro-eLg_WCt2kelh",
  {
    auth: {
      persistSession: true,
      storage: window.localStorage
    }
  }
);

const API_KEY = "d7f97chr01qpjqqju8f0";

const defaultSymbols = ["AAPL","MSFT","NVDA"];

let user=null, symbols=[], portfolio={}, dataMap={}, rows={};
async function logout(){
  const { error } = await supabase.auth.signOut();

  if(error){
    console.error(error);
    return;
  }

  user = null;

  // clear UI
  app.innerHTML = "";

  // go back to login
  showLogin();
}

const fmtMoney=n=>"$"+(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoney0=n=>"$"+(n||0).toLocaleString();

function showLogin(){
  app.innerHTML=`
  <div class="loginWrap">
    <div class="loginCard">
      <h2>Login</h2>

      <input id="email" placeholder="Email">
      <input id="pass" type="password" placeholder="Password">

      <label style="display:flex;align-items:center;gap:8px;font-size:13px;">
        <input type="checkbox" id="rememberMe">
        Remember Me
      </label>

      <button id="loginBtn">Login</button>
      <p id="msg"></p>
    </div>
  </div>`;
  
  // load saved email
  const savedEmail = localStorage.getItem("rememberEmail");
  const emailEl = document.getElementById("email");
  const rememberEl = document.getElementById("rememberMe");

if(savedEmail){
  emailEl.value = savedEmail;
  rememberEl.checked = true;
  }
  
  document.getElementById("loginBtn").onclick = window.login;
  
}

window.login = async function(){
  const emailVal = email.value;
  const passVal = pass.value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email: emailVal,
    password: passVal
  });

  // ✅ handle errors (IMPORTANT)
  if(error){
    msg.innerText = error.message;
    return;
  }

  // ✅ Remember Me logic
  if(rememberMe && rememberMe.checked){
    localStorage.setItem("rememberEmail", emailVal);
  } else {
    localStorage.removeItem("rememberEmail");
  }

  user = data.user;
  showApp();
}

function showApp(){
  app.innerHTML=`
  <div class="app">

  <div class="cards">
    <div class="card"><div>ASSETS</div><h2 id="pVal">$0</h2></div>
    <div class="card"><div>GAINS</div><h2 id="gVal">$0</h2></div>
    <div class="card"><div>MONTHLY</div><h2 id="mVal">$0</h2></div>
    <div class="card"><div>ANNUAL</div><h2 id="iVal">$0</h2></div>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="tableWrap">
    <div class="header">
      <div class="sticky">SYMBOL</div>
      <div>PRICE</div>
      <div>CHANGE</div>
      <div>DIV</div>
      <div>YIELD</div>
      <div>SHARES</div>
      <div>COST</div>
      <div>VALUE</div>
      <div>INCOME</div>
    </div>
    <div id="list"></div>
  </div>

 <div class="bottomCards">

  <!-- NET WORTH (FIRST) -->
  <div class="netWorthCard">
    <h3>NET WORTH</h3>
    <input id="cash" placeholder="CASH"><br>
    <input id="realEstate" placeholder="REAL ESTATE"><br>
    <input id="debt" placeholder="DEBT"><br>
    <h2 id="netVal">$0</h2>
  </div>

  <!-- PROJECTION (SECOND) -->
  <div class="projectionCard">
   <div style="display:flex; align-items:center; gap:8px;">
  
<div style="display:flex;align-items:center;gap:6px;">
  <h3 style="margin:0;">PROJECTION</h3>

  <button onclick="setRate(0.05)">5%</button>
  <button onclick="setRate(0.1)">10%</button>
  <button onclick="setRate(0.15)">15%</button>
</div>
    <div id="proj1y"></div>
    <div id="proj5y"></div>
    <div id="proj10y"></div>
    <div id="proj20y"></div>
    <div id="proj30y"></div>
    <div id="proj40y"></div>
  </div>

</div>

  <!-- CHART -->
  <canvas id="chart"></canvas>

  </div>`;

  document.getElementById("logoutBtn").onclick = logout;

  loadAll();

  rateSelect.onchange=refresh;
  cash.oninput=refresh;
  realEstate.oninput=refresh;
  debt.oninput=refresh;
}

async function loadAll(){
  const {data}=await supabase.from("portfolio").select("*").eq("user_id",user.id);

  portfolio={};
  (data || []).forEach(r=>{
  portfolio[r.symbol]=r;
});

  symbols=Object.keys(portfolio);

  render();
  refresh();
}

function createRow(sym){
  let d=portfolio[sym]||{};
  let row=document.createElement("div");
  row.className="row";

  row.innerHTML=`
    <div class="sticky">${sym}</div>
    <div>N/A</div>
    <div>N/A</div>
    <input value="${d.dividend||""}">
    <div>0%</div>
    <input value="${d.shares||""}">
    <input value="${d.cost||""}">
    <div>$0</div>
    <div>$0</div>
  `;

  row.children[5].oninput=e=>save(sym,"shares",e.target.value);
  row.children[3].oninput=e=>save(sym,"dividend",e.target.value);
  row.children[6].oninput=e=>save(sym,"cost",e.target.value);

  rows[sym]=row;
  return row;
}

function render(){
  list.innerHTML="";
  symbols.forEach(s=>list.appendChild(createRow(s)));
}

async function save(sym,field,val){
  portfolio[sym] = portfolio[sym] || {};
  portfolio[sym][field] = +val || 0;

  await supabase.from("portfolio").upsert({
    user_id:user.id,
    symbol:sym,
    ...portfolio[sym]
  });

  refresh();
}

function setRate(r){
  rateSelect.value = r;
  refresh();
}

function updateProjection(total){
  if(!total || isNaN(total)) return;

  function future(val, years){
    return val * Math.pow(1 + currentRate, years);
  }

  document.getElementById("proj1y").innerText =
    "1Y → " + fmtMoney0(future(total,1));

  document.getElementById("proj5y").innerText =
    "5Y → " + fmtMoney0(future(total,5));

  document.getElementById("proj10y").innerText =
    "10Y → " + fmtMoney0(future(total,10));

  document.getElementById("proj20y").innerText =
    "20Y → " + fmtMoney0(future(total,20));

  document.getElementById("proj30y").innerText =
    "30Y → " + fmtMoney0(future(total,30));

  document.getElementById("proj40y").innerText =
    "40Y → " + fmtMoney0(future(total,40));
}

function refresh(){
  let total=0,incomeTotal=0,monthly=0;

  symbols.forEach(s=>{
    let d=portfolio[s];
    let price=100; // demo

    let val=price*(d.shares||0);
    let income=(d.dividend||0)*(d.shares||0);

    total+=val;
    incomeTotal+=income;
    monthly+=income/12;

    rows[s].children[7].innerText=fmtMoney(val);
    rows[s].children[8].innerText=fmtMoney(income);
  });

  pVal.innerText=fmtMoney0(total);
  iVal.innerText=fmtMoney0(incomeTotal);
  mVal.innerText=fmtMoney0(monthly);

  updateProjection(total);

  // NET WORTH
  let nw = total
    + (+cash.value||0)
    + (+realEstate.value||0)
    - (+debt.value||0);

  netVal.innerText=fmtMoney0(nw);
}

function setRate(r){
  currentRate = r;
  refresh(); // 🔥 forces projection update
}

async function start(){
  const { data } = await supabase.auth.getSession();
  user = data.session?.user;

  if(user){
    showApp();
  } else {
    showLogin();
  }
}

start();

});

</script>

</body>
</html>
