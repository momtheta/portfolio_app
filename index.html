<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f5f7f9;
  margin:0;
}

.app{
  padding:16px;
  max-width:1400px;
  margin:0 auto;
}

.loginWrap{display:flex;justify-content:center;padding-top:40px}
.loginCard{
  max-width:420px;width:100%;
  background:white;padding:24px;border-radius:16px;
  display:flex;flex-direction:column;gap:12px
}
.loginCard input{padding:14px}
.loginCard button{
  padding:12px;background:#16a34a;color:white;
  border:none;border-radius:8px
}

.cards{display:flex;gap:10px;margin-bottom:10px;align-items:center}
.card{
  flex:1;background:#f0fdf4;
  padding:12px;border-radius:10px
}

#logoutBtn{
  background:#16a34a;color:white;
  border:none;padding:10px;border-radius:8px;
  height:40px;
}

.tableWrap{
  width:100%;
  overflow-x:auto;
}

/* unified column sizing */
.header, .row{
  display:grid;
  grid-template-columns:
    max-content  /* SYMBOL */
    repeat(7, minmax(max-content, 1fr));
  min-width:900px;
}

/* headers */
.header{
  position:sticky;
  top:0;
  background:white;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.04em;
  color:#444;
}

/* cells */
.header > div,
.row > div,
.row input{
  padding:10px;
  border-right:1px solid #e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center; /* center everything */
}

/* remove last column border */
.header > div:last-child,
.row > div:last-child{
  border-right:none;
}

/* sticky symbol column */
.sticky{
  position:sticky;
  left:0;
  background:white;
  z-index:2;
}

/* rows */
.row{
  background:white;
  font-size:14px;
}

/* inputs centered like data */
.row input{
  text-align:center;
  font-variant-numeric:tabular-nums;
  border:none;
  outline:none;
  background:transparent;
}

.row:hover{
  background:#f9fafb;
}

.price,.change,.yield,.value,.income{
  text-align:right;
  font-variant-numeric:tabular-nums;
}
</style>
</head>

<body>

<div id="app">Loading...</div>

<script>
window.addEventListener("load", () => {

const app = document.getElementById("app");

const supabase = window.supabase.createClient(
  "https://yxvgevzvrvhtzmfxgitk.supabase.co",
  "sb_publishable_d2n-HOcVv50_yjKAro-eLg_WCt2kelh",
  {auth:{persistSession:true,storage:window.localStorage}}
);

const API_KEY = "d7f97chr01qpjqqju8f0d7f97chr01qpjqqju8fg";

const defaultSymbols = [
  "AAPL","AMZN","MSFT","NVDA","QYLD","VTSAX",
  "NFLX","DOMO","RELX","SMCY","PGBAX"
];

let user=null, symbols=[], portfolio={}, dataMap={}, rows={};

// ---------- FORMAT ----------
function fmtMoney(n){
  return "$" + (n || 0).toLocaleString(undefined,{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

function fmtNumber(n){
  return (n || 0).toLocaleString(undefined,{
    minimumFractionDigits:3,
    maximumFractionDigits:3
  });
}

function fmtPercent(n){
  return (n*100).toLocaleString(undefined,{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  }) + "%";
}

// ---------- LOGIN ----------
function showLogin(){
  app.innerHTML=`
    <div class="loginWrap">
      <div class="loginCard">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="pass" type="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <p id="msg"></p>
      </div>
    </div>
  `;
  loginBtn.onclick=login;
}

async function login(){
  const {data,error}=await supabase.auth.signInWithPassword({
    email:email.value,password:pass.value
  });
  if(error){ msg.innerText=error.message; return; }
  user=data.user;
  showApp();
}

async function logout(){
  await supabase.auth.signOut();
  user=null;
  showLogin();
}

// ---------- APP ----------
function showApp(){
  app.innerHTML=`
    <div class="app">
      <div class="cards">
        <div class="card"><div>PORTFOLIO</div><h2 id="pVal">$0</h2></div>
        <div class="card"><div>INCOME</div><h2 id="iVal">$0</h2></div>
        <div class="card"><div>GAINS</div><h2 id="gVal">$0</h2></div>
        <button id="logoutBtn">Logout</button>
      </div>

      <div class="tableWrap">
        <div class="header">
          <div class="sticky">SYMBOL</div>
          <div>PRICE</div>
          <div>CHANGE</div>
          <div>DIV</div>
          <div>YIELD</div>
          <div>SHARES</div>
          <div>VALUE</div>
          <div>INCOME</div>
        </div>
        <div id="list"></div>
      </div>
    </div>
  `;

  logoutBtn.onclick=logout;
  loadAll();
}

// ---------- LOAD ----------
async function loadAll(){
  const {data:pData}=await supabase
    .from("portfolio")
    .select("*")
    .eq("user_id",user.id);

  portfolio={};
  (pData||[]).forEach(r=>{
    portfolio[r.symbol]={
      shares:+r.shares||0,
      dividend:+r.dividend||0
    };
  });

  symbols=[...new Set([...defaultSymbols,...Object.keys(portfolio)])];

  render();
  refresh();

  symbols.forEach(fetchQuote);
}

// ---------- SAVE ----------
async function saveField(sym,field,val){
  portfolio[sym]=portfolio[sym]||{};
  portfolio[sym][field]=+val||0;

  refresh();

  await supabase.from("portfolio").upsert({
    user_id:user.id,
    symbol:sym,
    shares:portfolio[sym].shares||0,
    dividend:portfolio[sym].dividend||0
  }, {onConflict:"user_id,symbol"});
}

// ---------- API ----------
async function fetchQuote(sym){
  try{
    let r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${API_KEY}`);
    let d=await r.json();
    if(d.c) dataMap[sym]=d;
    refresh();
  }catch{}
}

// ---------- UI ----------
function createRow(sym){
  let d=portfolio[sym]||{};
  let row=document.createElement("div");
  row.className="row";

  row.innerHTML=`
    <div class="sticky">${sym}</div>
    <div class="price">N/A</div>
    <div class="change">N/A</div>
    <input class="divInput" value="${d.dividend?fmtNumber(d.dividend):""}" placeholder="0.000">
    <div class="yield">0%</div>
    <input class="sharesInput" value="${d.shares?fmtNumber(d.shares):""}" placeholder="0.000">
    <div class="value">$0</div>
    <div class="income">$0</div>
  `;

  row.querySelector(".sharesInput").oninput=e=>saveField(sym,"shares",e.target.value);
  row.querySelector(".divInput").oninput=e=>saveField(sym,"dividend",e.target.value);

  rows[sym]=row;
  return row;
}

function render(){
  list.innerHTML="";
  rows={};
  symbols.forEach(s=>list.appendChild(createRow(s)));
}

// ---------- CORE ----------
function refresh(){
  let total=0,incomeTotal=0,gainTotal=0;

  symbols.forEach(s=>{
    let q=dataMap[s];
    let d=portfolio[s]||{};
    let row=rows[s];
    if(!row) return;

    let price=q?.c||0;
    let shares=d.shares||0;
    let dividend=d.dividend||0;

    let val=price*shares;
    let income=dividend*shares;
    let change=(q&&q.pc)?(q.c-q.pc):0;
    let yieldVal=price?dividend/price:0;

    total+=val;
    incomeTotal+=income;
    gainTotal+=change*shares;

    row.querySelector(".price").innerText=q?fmtMoney(price):"N/A";
    row.querySelector(".change").innerText=q?fmtMoney(change):"N/A";
    row.querySelector(".change").style.color=
      change>0?"#16a34a":change<0?"#dc2626":"#999";

    row.querySelector(".yield").innerText=fmtPercent(yieldVal);
    row.querySelector(".value").innerText=fmtMoney(val);
    row.querySelector(".income").innerText=fmtMoney(income);
  });

  pVal.innerText=fmtMoney(total);
  iVal.innerText=fmtMoney(incomeTotal);
  gVal.innerText=fmtMoney(gainTotal);
}

// ---------- INIT ----------
async function initAuth(){
  showLogin();
  const {data}=await supabase.auth.getSession();
  user=data.session?.user;
  if(user) showApp();
}

initAuth();

});
</script>

<!-- ✅ AUTO HEIGHT FOR WEEBLY -->
<script>
function sendHeight(){
  const height = document.documentElement.scrollHeight;
  parent.postMessage({ type: "resize", height }, "*");
}

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);
setInterval(sendHeight, 800);
</script>

</body>
</html>
