  <script>
    window.addEventListener("load", () => {

      const app = document.getElementById("app");

      const supabase = window.supabase.createClient(
        "https://yxvgevzvrvhtzmfxgitk.supabase.co",
        "sb_publishable_d2n-HOcVv50_yjKAro-eLg_WCt2kelh",

      );
      window.supabaseClient = supabase;
      const defaultSymbols = [
        "AAPL", "AMZN", "MSFT", "NVDA", "QYLD", "VTSAX",

      ];

      let user = null, symbols = [], portfolio = [], dataMap = {}, rows = {};

      const fmtMoney = n => "$" + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const fmtMoney0 = n => "$" + (n || 0).toLocaleString(undefined, {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      });
      const fmtNumber = n => (n || 0).toLocaleString(undefined, { minimumFractionDigits: 3, maximumFractionDigits: 3 });
      const fmtPercent = n => (n * 100).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "%";

      function showLogin() {
        app.innerHTML = `
    <div class="loginWrap">
      <div class="loginCard">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="pass" type="password" placeholder="Password">
        <button id="loginBtn">LOGIN</button>
        <p id="msg"></p>
      </div>
    </div>`;
        document.getElementById("loginBtn").onclick = login;
      }

      async function login() {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email.value, password: pass.value
        });
        if (error) { msg.innerText = error.message; return; }
        user = data.user;
        window.currentUser = user;
        showApp();
      }

      async function logout() {
        await supabase.auth.signOut();
        user = null;
        showLogin();
      }

      function showApp() {
        app.innerHTML = `
    <div class="app">
  <!-- 🔥 HEADER BAR -->
  <div class="topBar">
    <div class="topLeft">
  <div id="todayDate"></div>
  <div id="marketStatus"></div>
</div>
    <button id="logoutBtn">LOGOUT</button>
  </div>
      <!-- TOP CARDS -->
      <div class="cards">
        <div class="card"><div>ASSETS</div><h2 id="pVal">$0</h2></div>
        <div class="card"><div>TOTAL GAIN</div><h2 id="gVal">$0</h2></div>
        <div class="card"><div>TODAY</div><h2 id="todayVal">$0</h2></div> 
        <div class="card"><div>MONTHLY</div><h2 id="mVal">$0</h2></div>
        <div class="card"><div>ANNUAL</div><h2 id="iVal">$0</h2></div>
      </div>

      <!-- TABLE -->
      <div class="tableWrap">
        <div class="header">
          <div class="sticky col">SYMBOL<div class="resizer"></div></div>
          <div class="col">PRICE<div class="resizer"></div></div>
          <div class="col">CHANGE<div class="resizer"></div></div>
          <div class="col">SHARES<div class="resizer"></div></div>
          <div class="col">COST<div class="resizer"></div></div>
          <div class="col">VALUE<div class="resizer"></div></div>
          <div class="col">DIV<div class="resizer"></div></div>
          <div class="col">YIELD<div class="resizer"></div></div>
          <div class="col">INCOME<div class="resizer"></div></div>
        </div>
        <div id="list"></div>
      </div>

<!-- PANELS -->
<div class="bottomPanels">

  <!-- 🔥 NET WORTH (LEFT / BIG) -->
  <div class="networthCard large">

   <div class="netHeader">
  <h3>NET WORTH</h3>
  <button id="editNetBtn" class="toolBtn">✏️ EDIT</button>
</div>

    <div class="chartBox">
      <canvas id="networthChart"></canvas>
    </div>

    <div id="networthEditor" style="display:none; margin-top:12px;"></div>

  </div>

  <!-- 🔥 PROJECTION (RIGHT) -->
  <div class="projCard large">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3>PROJECTION</h3>
      <select id="rateSelect" class="ratePill">
        <option value="0.05">5%</option>
        <option value="0.08">8%</option>
        <option value="0.10" selected>10%</option>
        <option value="0.12">12%</option>
        <option value="0.15">15%</option>
      </select>
    </div>

    <div class="projGrid">
      <div><span>1Y</span><b id="proj1y">$0</b></div>
      <div><span>5Y</span><b id="proj5y">$0</b></div>
      <div><span>10Y</span><b id="proj10y">$0</b></div>
      <div><span>20Y</span><b id="proj20y">$0</b></div>
      <div><span>30Y</span><b id="proj30y">$0</b></div>
      <div><span>40Y</span><b id="proj40y">$0</b></div>
    </div>
  </div>

  `;
        const todayEl = document.getElementById("todayDate");

        const today = new Date();
        const formatted = today.toLocaleDateString(undefined, {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric"
        });

        document.getElementById("todayDate").innerText = "Today: " + formatted;

        todayEl.innerText =
          "Today: " +
          today.toLocaleDateString(undefined, {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric"
          });
        if (!window.quoteInterval) {
          window.quoteInterval = setInterval(fetchAllQuotes, 30000);
        }

        // 🔐 actions
        document.getElementById("logoutBtn")?.addEventListener("click", logout);
        createToolbar();
        loadWidths();
        loadAll();
        enableResize();

        const rateSelect = document.getElementById("rateSelect");
        if (rateSelect) {
          rateSelect.onchange = () => refresh();
        }

        // 📊 chart setup (correct timing)
        initChart();
        initNetworthChart();
        updateMarketStatus();
        setInterval(updateMarketStatus, 60000);
      }

      function loadWidths() {
        for (let i = 1; i <= 9; i++) {
          let w = localStorage.getItem("col" + i);
          if (w) document.documentElement.style.setProperty(`--c${i}`, w);
        }
      }
      function saveWidth(i, w) {
        localStorage.setItem("col" + i, w);
      }

      function enableResize() {
        document.querySelectorAll(".header .col").forEach((col, i) => {
          let resizer = col.querySelector(".resizer");
          let startX, startW;

          resizer.onmousedown = e => {
            startX = e.clientX;
            startW = col.offsetWidth;

            document.onmousemove = e => {
              let w = Math.max(80, startW + (e.clientX - startX));
              document.documentElement.style.setProperty(`--c${i + 1}`, w + "px");
              saveWidth(i + 1, w + "px");
            };
            document.onmouseup = () => document.onmousemove = null;
          };
        });
      }

      async function loadAll() {
        const { data } = await supabase
          .from("portfolio")
          .select("*")
          .eq("user_id", user.id);

        portfolio = (data || []).map(r => ({
          id: r.id,
          symbol: r.symbol,
          shares: +r.shares || 0,
          dividend: +r.dividend || 0,
          cost: +r.cost || 0,
          last_price: +r.last_price || 0   // 🔥 ADD THIS
        }));

        symbols = portfolio.map(p => p.symbol);
        portfolio.sort((a, b) => (a.position ?? 0) - (b.position ?? 0));
        render();
        refresh();
        fetchAllQuotes();
      }

      async function saveField(id, field, val) {
        let row = portfolio.find(x => x.id === id);
        if (!row) return;

        row[field] = parseFloat(val.replace(/,/g, "")) || 0;

        refresh();

        await supabase
          .from("portfolio")
          .update({
            shares: row.shares,
            dividend: row.dividend,
            cost: row.cost
          })
          .eq("id", id);
      }



      async function fetchAllQuotes() {
        try {
          if (!symbols.length) return;

          const res = await fetch(
            `https://yxvgevzvrvhtzmfxgitk.functions.supabase.co/quote?symbols=${symbols.join(",")}`
          );

          const data = await res.json();

          console.log("QUOTE DATA:", data);

          if (!data || typeof data !== "object") return;

          Object.keys(data).forEach(sym => {
            if (data[sym] && data[sym].c) {
              dataMap[sym] = data[sym];
            }
          });

          refresh();

        } catch (err) {
          console.error("Batch quote error", err);
        }
      }

      function createRow(p) {
        let d = p;
        let sym = p.symbol;
        let row = document.createElement("div");
        row.className = "row";

        row.innerHTML = `
  <div class="sticky">${sym}</div>
  <div>N/A</div>
  <div>N/A</div>
  <input value="${d.shares ? fmtNumber(d.shares) : ""}">
  <input value="${d.cost ? fmtMoney(d.cost) : ""}">
  <div>$0</div>
  <input value="${d.dividend ? fmtNumber(d.dividend) : ""}">
  <div>0%</div>
  <div>$0</div>
`;
        const del = document.createElement("button");
        del.innerText = "✕";
        del.style.cssText = `
  margin-left:6px;
  background:#ef4444;
  color:white;
  border:none;
  border-radius:6px;
  padding:2px 6px;
  cursor:pointer;
`;
        del.style.marginRight = "6px";
        del.style.marginLeft = "0";
        del.onclick = () => deleteRow(p.id);
        row.children[0].prepend(del); // attach to SYMBOL column
        row.children[3].oninput = e => saveField(p.id, "shares", e.target.value);
        row.children[6].oninput = e => saveField(p.id, "dividend", e.target.value);
        row.children[4].oninput = e => saveField(p.id, "cost", e.target.value);

        rows[p.id] = row;
        return row;
      }

      function render() {
        list.innerHTML = "";
        rows = {};
        portfolio.forEach(p => list.appendChild(createRow(p)));
      }

      function updateProjection(current) {
        if (isNaN(current)) return;   // ✅ allow 0 but skip if not a number

        const rateEl = document.getElementById("rateSelect");
        const rate = rateEl ? parseFloat(rateEl.value) : 0.10;

        function future(val, years) {
          return val * Math.pow(1 + rate, years);
        }

        const map = {
          proj1y: 1,
          proj5y: 5,
          proj10y: 10,
          proj20y: 20,
          proj30y: 30,
          proj40y: 40
        };

        Object.entries(map).forEach(([id, yrs]) => {
          const el = document.getElementById(id);
          if (el) {
            el.innerText = fmtMoney0(future(current, yrs));
          }
        });
      }

      function refresh() {

        let total = 0;
        let incomeTotal = 0;
        let gainTotal = 0;
        let monthlyTotal = 0;
        let dailyGainTotal = 0;

        portfolio.forEach(p => {
          let s = p.symbol;
          let q = dataMap[s];
          let row = rows[p.id];
          if (!row) return;
          // 🔥 reset all cell backgrounds first
          for (let i = 0; i < 9; i++) {
            row.children[i].style.background = "transparent";
          }

          let price = q?.c || p.last_price || 0;
          let shares = p.shares || 0;
          let dividend = p.dividend || 0;
          let cost = p.cost || 0;

          let val = price ? price * shares : cost * shares;
          let invested = cost * shares;
          let realGain = val - invested;
          let income = dividend * shares;

          let change = (q && q.pc) ? (q.c - q.pc) : 0;
          let yieldVal = price ? dividend / price : 0;

          total += val;
          incomeTotal += income;
          gainTotal += realGain;
          monthlyTotal += income / 12;
          dailyGainTotal += change * shares;

          // UI
          const priceText = price ? fmtMoney(price) : "N/A";
          if (row.children[1].innerText !== priceText) {
            row.children[1].innerText = priceText;
          }
          const changeText = q ? fmtMoney(change) : "N/A";
          if (row.children[2].innerText !== changeText) {
            row.children[2].innerText = changeText;
          }
          row.children[2].style.color =
            change > 0 ? "#16a34a" :
              change < 0 ? "#dc2626" : "#999";

          const valueText = fmtMoney(val);
          if (row.children[5].innerText !== valueText) {
            row.children[5].innerText = valueText;
          }
          if (realGain > 0) {
            row.children[5].style.background = "#ecfdf5";
          } else if (realGain < 0) {
            row.children[5].style.background = "#fef2f2";
          } else {
            row.children[5].style.background = "transparent";
          }

          row.children[7].innerText = fmtPercent(yieldVal);
          row.children[7].style.background = "transparent";

          const incomeText = fmtMoney(income);
          if (row.children[8].innerText !== incomeText) {
            row.children[8].innerText = incomeText;
          }
          row.children[8].style.background =
            income > 0 ? "#dbeafe" : "transparent";
          row.children[8].style.color =
            income > 0 ? "#1d4ed8" : "#111";
          row.children[8].style.fontWeight =
            income > 0 ? "600" : "400";
        });

        // TOP CARDS
        pVal.innerText = fmtMoney0(total);
        iVal.innerText = fmtMoney0(incomeTotal);

        gVal.innerText = fmtMoney0(gainTotal);
        gVal.style.color =
          gainTotal > 0 ? "#16a34a" :
            gainTotal < 0 ? "#dc2626" : "#333";

        const todayVal = document.getElementById("todayVal");
        if (todayVal) {
          todayVal.innerText =
            (dailyGainTotal > 0 ? "+" : "") + fmtMoney0(dailyGainTotal);

          todayVal.style.color =
            dailyGainTotal > 0 ? "#16a34a" :
              dailyGainTotal < 0 ? "#dc2626" : "#333";
        }

        mVal.innerText = "$" + monthlyTotal.toLocaleString(undefined, {
          minimumFractionDigits: 0,
          maximumFractionDigits: 0
        });

        updateProjection(total);
        // updateHistorySafe();
      }

      async function addRow() {
        const symbol = prompt("Enter symbol (e.g. AAPL)");
        if (!symbol) return;

        const { data, error } = await supabase
          .from("portfolio")
          .insert({
            user_id: user.id,
            symbol: symbol.toUpperCase(),
            shares: 0,
            dividend: 0,
            cost: 0
          })
          .select()
          .single();

        if (error) {
          alert(error.message);
          return;
        }

        // add locally
        portfolio.push({
          id: data.id,
          symbol: data.symbol,
          shares: 0,
          dividend: 0,
          cost: 0
        });

        symbols.push(data.symbol);

        const newRow = createRow(portfolio[portfolio.length - 1]);
        list.appendChild(newRow);

      }

      async function deleteRow(id) {

        if (!confirm("Delete this row?")) return;

        await supabase
          .from("portfolio")
          .delete()
          .eq("id", id);

        // remove locally
        portfolio = portfolio.filter(p => p.id !== id);

        // remove DOM
        if (rows[id]) {
          rows[id].remove();
          delete rows[id];
        }

        refresh();
      }

      async function resetOrder() {

        if (!confirm("Sort alphabetically?")) return;

        // fetch fresh data
        const { data, error } = await supabase
          .from("portfolio")
          .select("id, symbol")
          .eq("user_id", user.id);

        if (error) {
          alert(error.message);
          return;
        }

        // sort alphabetically
        data.sort((a, b) => a.symbol.localeCompare(b.symbol));

        // assign new positions
        for (let i = 0; i < data.length; i++) {
          await supabase
            .from("portfolio")
            .update({ position: i + 1 })
            .eq("id", data[i].id);
        }

        // reload app
        loadAll();
      }
      function createToolbar() {

        const wrap = document.createElement("div");

        wrap.style.cssText = `
    display:flex;
    gap:8px;
    margin-bottom:12px;
    align-items:center;
  `;

        wrap.innerHTML = `
    <button id="addRowBtn" class="toolBtn">
      ➕ <span>ADD SYMBOL</span>
    </button>

    <button id="resetOrderBtn" class="toolBtn blue">
      🔄 <span>SORT ALPHABETICALLY</span>
    </button>
  `;

        // insert ABOVE table
        const table = document.querySelector(".tableWrap");
        table.parentNode.insertBefore(wrap, table);

        // wire actions
        document.getElementById("addRowBtn").onclick = addRow;
        document.getElementById("resetOrderBtn").onclick = resetOrder;
      }

      async function initAuth() {
        showLogin();
        const { data } = await supabase.auth.getSession();
        user = data.session?.user;

        if (user) {
          window.currentUser = user;   // 🔥 ADD THIS LINE
          showApp();
        }
      }

      initAuth();

    });
    let historyData = JSON.parse(localStorage.getItem("portfolioHistory") || "[]");
    let chart;
    let currentRange = "all";

    let netChart;
    function updateMarketStatus() {
      const el = document.getElementById("marketStatus");
      if (!el) return;

      const now = new Date();

      // Convert to US Eastern Time
      const est = new Date(
        now.toLocaleString("en-US", { timeZone: "America/New_York" })
      );

      const day = est.getDay(); // 0 = Sunday, 6 = Saturday
      const hours = est.getHours();
      const minutes = est.getMinutes();

      const isWeekend = day === 0 || day === 6;

      const afterOpen = hours > 9 || (hours === 9 && minutes >= 30);
      const beforeClose = hours < 16;

      const isOpen = !isWeekend && afterOpen && beforeClose;

      if (isOpen) {
        el.innerText = "🟢 Market Open";
        el.className = "market-open";
      } else {
        el.innerText = "🔴 Market Closed";
        el.className = "market-closed";
      }
    }
    async function fetchNetworthData() {
      const supabase = window.supabaseClient;

      const { data: authData } = await supabase.auth.getUser();
      const user = authData.user;

      if (!user) return [];

      const { data, error } = await supabase
        .from("net_worth")
        .select("*")
        .eq("user_id", user.id)
        .order("date", { ascending: true });

      if (error) {
        console.error(error);
        return [];
      }

      return data;
    }

    async function initNetworthChart() {

      const data = await fetchNetworthData();
      console.log("NET DATA:", data);
      if (!window.currentUser) return;

      const ctx = document.getElementById("networthChart");
      if (!ctx) {
        console.warn("Canvas not ready — retrying...");
        setTimeout(initNetworthChart, 200);
        return;
      }

      if (netChart) netChart.destroy(); // 🔥 prevent duplicates

      netChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: data.map(d => d.date),
          datasets: [
            { label: "Cash", data: data.map(d => d.cash), borderColor: "#1f77b4", tension: 0.35 },
            { label: "Retirement", data: data.map(d => d.retirement), borderColor: "#ff7f0e", tension: 0.35 },
            { label: "Stocks", data: data.map(d => d.stocks), borderColor: "#2ca02c", tension: 0.35 },
            { label: "Properties", data: data.map(d => d.properties), borderColor: "#17becf", tension: 0.35 },
            { label: "Mortgage", data: data.map(d => d.mortgage), borderColor: "#d62728", tension: 0.35 },
            {
              label: "Net",
              data: data.map(d =>
                d.stocks + d.properties + d.retirement + d.cash - d.mortgage
              ),
              borderColor: "#9467bd",
              borderWidth: 3,
              tension: 0.35
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: { legend: { position: "right" } },
          scales: {
            y: {
              ticks: { callback: v => "$" + v.toLocaleString() }
            }
          }
        }
      });
    }

    function initChart() {
      const ctx = document.getElementById("historyChart");
      if (!ctx) return;

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: [],
          datasets: [{
            label: "Portfolio",
            data: [],
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { display: false },
            y: {
              ticks: {
                callback: v => "$" + v.toLocaleString()
              }
            }
          }
        }
      });
    }

    if (chart) {

      let filtered = historyData;

      if (currentRange !== "all") {
        filtered = historyData.slice(-currentRange);
      }

      const newLabels = filtered.map(d => d.time);
      const newData = filtered.map(d => d.value);

      const oldData = chart.data.datasets[0].data;

      // ✅ append instead of replace
      if (newData.length > oldData.length) {
        chart.data.labels.push(newLabels[newLabels.length - 1]);
        oldData.push(newData[newData.length - 1]);

        // 🔥 sliding window (fixed width)
        const MAX_POINTS = 60;
        if (oldData.length > MAX_POINTS) {
          chart.data.labels.shift();
          oldData.shift();
        }

      } else {
        // fallback (range change etc)
        chart.data.labels = newLabels;
        chart.data.datasets[0].data = newData;
      }

      chart.update("none"); // 🔥 NO animation = no flicker
    }

  </script>

  <script>
    function sendHeight() {
      parent.postMessage({ type: "resize", height: document.body.scrollHeight }, "*");
    }
    window.addEventListener("load", sendHeight);
    window.addEventListener("resize", sendHeight);
    setInterval(sendHeight, 800);

  </script>
