<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f5f7f9;
  margin:0;
}

.app{
  padding:16px;
  max-width:1400px;
  margin:0 auto;
}

/* CARDS */
.cards{display:flex;gap:10px;margin-bottom:10px;align-items:center}
.card{
  flex:1;background:#f0fdf4;
  padding:12px;border-radius:10px
}
.card h2{
  font-size:18px;
  margin:4px 0 0 0;
}
#logoutBtn{
  background:#16a34a;color:white;
  border:none;padding:10px;border-radius:8px;height:40px;
}

/* TABLE */
.tableWrap{width:100%;overflow-x:auto}

:root{
  --c1:140px; --c2:140px; --c3:140px; --c4:140px;
  --c5:140px; --c6:140px; --c7:140px; --c8:140px; --c9:140px;
}

.header,.row{
  display:grid;
  grid-template-columns:
    var(--c1) var(--c2) var(--c3) var(--c4)
    var(--c5) var(--c6) var(--c7) var(--c8) var(--c9);
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:white;
  border-bottom:2px solid #d1d5db;
}

/* CELLS */
.header > div,
.row > div{
  padding:10px;
  border-right:1px solid #e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
}

.row .sticky{
  justify-content:flex-start;
}

/* INPUT */
.row input{
  width:100%;
  border:none;
  background:transparent;
  text-align:center;
}

/* remove last border */
.header > div:last-child,
.row > div:last-child{
  border-right:none;
}

/* sticky symbol */
.sticky{
  position:sticky;
  left:0;
  background:white;
  z-index:5;
}

/* rows */
.row{background:white}
.row:hover{background:#f9fafb}

/* projection spacing */
#proj1y,#proj5y,#proj10y,#proj20y,#proj30y,#proj40y{
  margin-top:6px;
}

/* NET WORTH */
.netWorth{
  margin-top:20px;
  background:#f0fdf4;
  padding:16px;
  border-radius:12px;
}
</style>
</head>

<body>
<div id="app">Loading...</div>

<script>
window.addEventListener("load", () => {

const app = document.getElementById("app");

const supabase = window.supabase.createClient(
  "https://yxvgevzvrvhtzmfxgitk.supabase.co",
  "sb_publishable_d2n-HOcVv50_yjKAro-eLg_WCt2kelh"
);

const API_KEY = "d7f97chr01qpjqqju8f0";

const defaultSymbols = ["AAPL","MSFT","NVDA"];

let user=null, symbols=[], portfolio={}, dataMap={}, rows={};

const fmtMoney=n=>"$"+(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoney0=n=>"$"+(n||0).toLocaleString();

function showLogin(){
  app.innerHTML=`<div style="padding:40px">
    <input id="email" placeholder="email"><br><br>
    <input id="pass" type="password" placeholder="password"><br><br>
    <button onclick="login()">Login</button>
  </div>`;
}

window.login=async function(){
  const {data}=await supabase.auth.signInWithPassword({
    email:email.value,password:pass.value
  });
  user=data.user;
  showApp();
}

function showApp(){
  app.innerHTML=`
  <div class="app">

  <div class="cards">
    <div class="card"><div>ASSETS</div><h2 id="pVal">$0</h2></div>
    <div class="card"><div>GAINS</div><h2 id="gVal">$0</h2></div>
    <div class="card"><div>MONTHLY</div><h2 id="mVal">$0</h2></div>
    <div class="card"><div>ANNUAL</div><h2 id="iVal">$0</h2></div>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="tableWrap">
    <div class="header">
      <div class="sticky">SYMBOL</div>
      <div>PRICE</div>
      <div>CHANGE</div>
      <div>DIV</div>
      <div>YIELD</div>
      <div>SHARES</div>
      <div>COST</div>
      <div>VALUE</div>
      <div>INCOME</div>
    </div>
    <div id="list"></div>
  </div>

  <!-- PROJECTION -->
  <div style="margin-top:20px;background:#f0fdf4;padding:16px;border-radius:12px">
    <h3>Projection
      <select id="rateSelect">
        <option value="0.05">5%</option>
        <option value="0.1" selected>10%</option>
        <option value="0.15">15%</option>
      </select>
    </h3>
    <div id="proj1y"></div>
    <div id="proj5y"></div>
    <div id="proj10y"></div>
    <div id="proj20y"></div>
    <div id="proj30y"></div>
    <div id="proj40y"></div>
  </div>

  <!-- NET WORTH -->
  <div class="netWorth">
    <h3>Net Worth</h3>
    <input id="cash" placeholder="Cash"><br>
    <input id="realEstate" placeholder="Real Estate"><br>
    <input id="debt" placeholder="Debt"><br>
    <h2 id="netVal">$0</h2>
  </div>

  <!-- CHART -->
  <canvas id="chart"></canvas>

  </div>`;

  logoutBtn.onclick=()=>location.reload();

  loadAll();

  rateSelect.onchange=refresh;
  cash.oninput=refresh;
  realEstate.oninput=refresh;
  debt.oninput=refresh;
}

async function loadAll(){
  const {data}=await supabase.from("portfolio").select("*").eq("user_id",user.id);

  portfolio={};
  data.forEach(r=>{
    portfolio[r.symbol]=r;
  });

  symbols=Object.keys(portfolio);

  render();
  refresh();
}

function createRow(sym){
  let d=portfolio[sym]||{};
  let row=document.createElement("div");
  row.className="row";

  row.innerHTML=`
    <div class="sticky">${sym}</div>
    <div>N/A</div>
    <div>N/A</div>
    <input value="${d.dividend||""}">
    <div>0%</div>
    <input value="${d.shares||""}">
    <input value="${d.cost||""}">
    <div>$0</div>
    <div>$0</div>
  `;

  row.children[5].oninput=e=>save(sym,"shares",e.target.value);
  row.children[3].oninput=e=>save(sym,"dividend",e.target.value);
  row.children[6].oninput=e=>save(sym,"cost",e.target.value);

  rows[sym]=row;
  return row;
}

function render(){
  list.innerHTML="";
  symbols.forEach(s=>list.appendChild(createRow(s)));
}

async function save(sym,field,val){
  portfolio[sym][field]=+val||0;

  await supabase.from("portfolio").upsert({
    user_id:user.id,
    symbol:sym,
    ...portfolio[sym]
  });

  refresh();
}

function updateProjection(total){
  let rate=parseFloat(rateSelect.value);

  function f(y){return total*Math.pow(1+rate,y)}

  proj1y.innerText="1Y → "+fmtMoney0(f(1));
  proj5y.innerText="5Y → "+fmtMoney0(f(5));
  proj10y.innerText="10Y → "+fmtMoney0(f(10));
  proj20y.innerText="20Y → "+fmtMoney0(f(20));
  proj30y.innerText="30Y → "+fmtMoney0(f(30));
  proj40y.innerText="40Y → "+fmtMoney0(f(40));
}

function refresh(){
  let total=0,incomeTotal=0,monthly=0;

  symbols.forEach(s=>{
    let d=portfolio[s];
    let price=100; // demo

    let val=price*(d.shares||0);
    let income=(d.dividend||0)*(d.shares||0);

    total+=val;
    incomeTotal+=income;
    monthly+=income/12;

    rows[s].children[7].innerText=fmtMoney(val);
    rows[s].children[8].innerText=fmtMoney(income);
  });

  pVal.innerText=fmtMoney0(total);
  iVal.innerText=fmtMoney0(incomeTotal);
  mVal.innerText=fmtMoney0(monthly);

  updateProjection(total);

  // NET WORTH
  let nw = total
    + (+cash.value||0)
    + (+realEstate.value||0)
    - (+debt.value||0);

  netVal.innerText=fmtMoney0(nw);
}

showLogin();

});
</script>

</body>
</html>
