     v5 Changes:
       - Fully mobile-responsive (iPhone Safari tested)
       - Table headers centered
       - Input cells (SHARES/COST/DIV) font matches page font
       - Renamed: "Today" topbar → "Date"
       - Renamed cards: TODAY'S GAIN · MONTHLY DIV · ANNUAL DIV
       - Renamed columns: SHARES (INPUT) · COST (INPUT) · DIV (INPUT)
       - Full enhanced projection with sliders + dual chart + Monte Carlo

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- width=device-width makes the page scale correctly on iPhone -->
  <!-- viewport-fit=cover fills the notch/safe-area on newer iPhones -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f7f9;
      margin: 0;
      /* Respect iPhone notch / home bar */
      padding-left:  env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      -webkit-text-size-adjust: 100%; /* prevent iOS auto font scaling */
    }

    .app {
      padding: 12px 14px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── LOGIN ── */
    .loginWrap { display: flex; justify-content: center; padding-top: 40px; }

    .loginCard {
      max-width: 420px;
      width: 100%;
      background: white;
      padding: 24px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .loginCard input {
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
      font-family: inherit;
      width: 100%;
    }

    .loginCard button {
      padding: 14px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── TOP HEADER BAR ── */
    .topBar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(229,231,235,0.6);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .topLeft { display: flex; flex-direction: column; gap: 2px; }

    /* "Date:" label — renamed from "Today:" */
    #todayDate {
      font-size: 13px;
      font-weight: 500;
      color: #1f2937;
    }

    #marketStatus {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .market-open   { color: #16a34a; }
    .market-closed { color: #dc2626; }

    #logoutBtn {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    /* ── SUMMARY CARDS (TODAY'S GAIN / MONTHLY DIV / ANNUAL DIV) ── */
    .cards {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1 1 100px;   /* flex-grow so cards fill width on mobile */
      min-width: 90px;
      padding: 10px 12px;
      background: #ecfdf5;
      border-radius: 10px;
      border: 1px solid #d1fae5;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .card div  { font-size: 10px; color: #555; font-weight: 600; letter-spacing: 0.04em; }
    .card h2   { font-size: 15px; margin: 3px 0 0 0; font-weight: 700; }

    /* ── TOOLBAR BUTTONS ── */
    .toolBtn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      font-size: 12px;
      font-family: inherit;
      border: none;
      border-radius: 6px;
      background: #111827;
      color: #e5e7eb;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .toolBtn span { font-weight: 500; }
    .toolBtn.blue { background: #1d4ed8; }

    /* ── PORTFOLIO TABLE ── */
    .tableWrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch; /* smooth momentum scroll on iOS */
      position: relative;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }

    :root {
      --c1: 130px; --c2: 110px; --c3: 110px;
      --c4: 110px; --c5: 110px; --c6: 110px;
      --c7: 100px; --c8: 90px;  --c9: 110px;
    }

    .header, .row {
      display: grid;
      grid-template-columns:
        var(--c1) var(--c2) var(--c3) var(--c4) var(--c5)
        var(--c6) var(--c7) var(--c8) var(--c9);
      min-width: 970px;
    }

    /* ── TABLE HEADER: all cells centered ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #f9fafb;
      border-bottom: 2px solid #d1d5db;
    }

    .header > div {
      padding: 9px 8px;
      border-right: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;  /* centered */
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #374151;
      background: #f9fafb;
    }

    .header > div:last-child { border-right: none; }

    /* data rows */
    .row > div {
      padding: 9px 8px;
      border-right: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      font-size: 13px;
    }

    /* ── STICKY SYMBOL COLUMN ── */
    .header .sticky {
      position: sticky;
      left: 0;
      z-index: 30;
      background: #f9fafb;
      box-shadow: 2px 0 4px rgba(0,0,0,0.06);
    }

    .row .sticky {
      position: sticky;
      left: 0;
      z-index: 10;
      background: white;
      box-shadow: 2px 0 4px rgba(0,0,0,0.04);
      justify-content: flex-start;
      font-weight: 600;
      font-size: 13px;
    }

    /* ── INPUT CELLS (SHARES, COST, DIV) ──
       font-family: inherit  → matches Inter, not browser default
       font-size: 13px       → matches surrounding cells
       16px min on mobile    → prevents iOS zoom                     */
    .row input {
      width: 100%;
      height: 100%;
      padding: 0 4px;
      margin: 0;
      border: none;
      outline: none;
      background: transparent;
      text-align: center;
      font-family: inherit;       /* KEY FIX: matches page font */
      font-size: 13px;            /* KEY FIX: matches cell font */
      font-variant-numeric: tabular-nums;
      color: #111;
    }

    /* On mobile, bump input font to 16px to prevent iOS auto-zoom */
    @media (max-width: 768px) {
      .row input { font-size: 16px; }
    }

    .row > div:last-child,
    .header > div:last-child { border-right: none; }

    .row { position: relative; z-index: 1; background: white; }
    .row:hover { background: #f9fafb; }

    /* Drag-to-resize handle */
    .col { position: relative; }
    .resizer {
      position: absolute;
      right: -3px;
      top: 0;
      width: 6px;
      height: 100%;
      cursor: col-resize;
    }

    /* ── NET WORTH SECTION (green wrapper) ── */
    .bottomSection {
      margin-top: 16px;
      background: #16a34a;
      padding: 14px 12px 12px;
      border-radius: 14px;
    }

    .networthCard {
      background: white;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid #e5e7eb;
      margin-top: 16px;
    }

    /* Chart header: title + stat cards */
    .netHeader {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .netHeader h3,
.projCard h3 {
  font-size: 14px;
  font-weight: 700;
  color: #111;
  margin: 0 0 14px 0;
  letter-spacing: 0.04em;
}

    /* ASSETS / TOTAL GAIN mini-cards */
    .nwStatCards { display: flex; gap: 8px; flex-wrap: wrap; }

    .nwStatCard {
      padding: 5px 10px;
      background: #f0fdf4;
      border-radius: 8px;
      border: 1px solid #bbf7d0;
      min-width: 90px;
    }

    .nwStatCard .label {
      font-size: 9px;
      color: #6b7280;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .nwStatCard .value {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      font-variant-numeric: tabular-nums;
    }

    /* Net worth chart canvas */
    .chartBox {
      background: #f3f4f6;
      border-radius: 10px;
      padding: 8px;
      border: 1px solid #e5e7eb;
      height: 280px;
    }

    /* ══════════════════════════════════════════
       ENHANCED PROJECTION CARD
       ══════════════════════════════════════════ */
    .projCard {
      background: white;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      margin-top: 12px;
    }

    /* Milestone row */
    .milestoneGrid {
      display: flex;
      gap: 0;
      font-variant-numeric: tabular-nums;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .milestoneCell {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 7px 2px;
      border-right: 1px solid #f3f4f6;
      background: #f9fafb;
    }

    .milestoneCell:last-child { border-right: none; }
    .milestoneCell .mLabel  { font-size: 9px;  font-weight: 700; color: #9ca3af; margin-bottom: 2px; }
    .milestoneCell .mNominal{ font-size: 11px; font-weight: 700; color: #111; }
    .milestoneCell .mReal   { font-size: 9px;  color: #9467bd;   font-weight: 600; margin-top: 1px; }

    /* Two-column on desktop, single-column on mobile */
    .projLayout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .projLayout {
        grid-template-columns: 1fr;  /* stack on mobile */
      }
    }

    .projControls { display: flex; flex-direction: column; gap: 12px; }

    .projSection {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
    }

    .projSectionTitle {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Slider rows */
    .sliderRow {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .sliderRow:last-child { margin-bottom: 0; }

    .sliderLabel {
      font-size: 12px;
      color: #374151;
      flex: 1;
      min-width: 0;
    }

    .sliderRow input[type=range] {
      width: 110px;
      flex-shrink: 0;
      accent-color: #16a34a;
      cursor: pointer;
      /* Larger touch target on mobile */
      height: 20px;
    }

    .sliderVal {
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #111;
      min-width: 48px;
      text-align: right;
    }

    /* Toggle switch */
    .toggleRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
      color: #374151;
      gap: 8px;
    }

    .toggleRow:last-child { margin-bottom: 0; }

    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggleSlider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #d1d5db;
      border-radius: 999px;
      transition: background 0.2s;
    }

    .toggleSlider::before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggleSlider { background: #16a34a; }
    .toggle input:checked + .toggleSlider::before { transform: translateX(16px); }

    /* Snapshot grid (starting position) */
    .snapGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    .snapItem {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 6px 8px;
    }

    .snapItem .snapLabel { font-size: 9px;  color: #9ca3af; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .snapItem .snapVal   { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; color: #111; margin-top: 1px; }

    /* Projection chart box */
    .projChartBox {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      height: 340px;
      position: relative;
    }

    @media (max-width: 768px) {
      .projChartBox { height: 260px; }
      .chartBox     { height: 220px; }
    }

    /* Advice buttons */
    .adviceRow { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

    .adviceBtn {
      padding: 7px 12px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: white;
      color: #374151;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .adviceBtn:active { background: #f3f4f6; }

    /* Monte Carlo label */
    .mcLabel { font-size: 10px; color: #9ca3af; margin-top: 4px; display: none; }
    .mcLabel.visible { display: block; }

    /* AI advice panel */
    .advicePanel {
      margin-top: 12px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.6;
      color: #111;
      display: none;
    }

    .advicePanel.visible { display: block; }
    .advicePanel .adviceTitle { font-weight: 700; font-size: 11px; color: #16a34a; margin-bottom: 6px; letter-spacing: 0.05em; }

    /* ── MOBILE OVERRIDES ── */
    @media (max-width: 600px) {
      .app { padding: 8px 10px; }

      /* Tighten top bar on small screens */
      #todayDate { font-size: 11px; }

      /* Cards: 3 across */
      .cards { gap: 6px; }
      .card  { padding: 8px 10px; }
      .card h2 { font-size: 14px; }

      /* Projection milestone: smaller text */
      .milestoneCell .mNominal { font-size: 10px; }
      .milestoneCell .mReal    { font-size: 9px; }

      /* Sliders: full width label stacks above */
      .sliderRow { flex-wrap: wrap; }
      .sliderLabel { width: 100%; }
      .sliderRow input[type=range] { width: 100%; }
    }

  </style>
</head>

<body>
  <div id="app">Loading...</div>

  <script>
    window.addEventListener("load", () => {

      const app = document.getElementById("app");

      const supabase = window.supabase.createClient(
        "https://yxvgevzvrvhtzmfxgitk.supabase.co",
        "sb_publishable_d2n-HOcVv50_yjKAro-eLg_WCt2kelh",
        { auth: { persistSession: true, storage: window.localStorage } }
      );
      window.supabaseClient = supabase;

      // ── App state ──
      let user           = null;
      let symbols        = [];
      let portfolio      = [];
      let dataMap        = {};
      let rows           = {};
      let netChart       = null;
      let quoteInterval  = null;
      let marketInterval = null;

      // ── Formatters ──
      const fmtMoney   = n => "$" + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const fmtMoney0  = n => "$" + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      const fmtNumber  = n => (n || 0).toLocaleString(undefined, { minimumFractionDigits: 3, maximumFractionDigits: 3 });
      const fmtPercent = n => (n * 100).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "%";

      function fmtMillions(v) {
        const abs = Math.abs(v);
        if (abs >= 1_000_000_000) return "$" + (v / 1_000_000_000).toFixed(1).replace(/\.0$/, "") + "B";
        if (abs >= 1_000_000)     return "$" + (v / 1_000_000).toFixed(1).replace(/\.0$/, "") + "M";
        if (abs >= 1_000)         return "$" + (v / 1_000).toFixed(0) + "K";
        return "$" + v.toLocaleString();
      }

      // ══════════════════════════════════════════
      // AUTH
      // ══════════════════════════════════════════

      function showLogin() {
        app.innerHTML = `
          <div class="loginWrap">
            <div class="loginCard">
              <h2 style="margin:0 0 4px;font-size:22px;">Login</h2>
              <input id="emailInput" type="email" placeholder="Email" autocomplete="email">
              <input id="passInput" type="password" placeholder="Password" autocomplete="current-password">
              <button id="loginBtn">LOGIN</button>
              <p id="msg" style="color:#dc2626;font-size:13px;margin:0;min-height:18px;"></p>
            </div>
          </div>`;
        document.getElementById("loginBtn").addEventListener("click", login);

        // Allow Enter key to submit
        document.getElementById("passInput").addEventListener("keydown", e => {
          if (e.key === "Enter") login();
        });
      }

      async function login() {
        const email = document.getElementById("emailInput").value.trim();
        const pass  = document.getElementById("passInput").value;
        const msg   = document.getElementById("msg");
        msg.innerText = "";
        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
        if (error) { msg.innerText = error.message; return; }
        user = data.user;
        window.currentUser = user;
        showApp();
      }

      async function logout() {
        clearInterval(quoteInterval);
        clearInterval(marketInterval);
        quoteInterval = marketInterval = null;
        if (projChart) { projChart.destroy(); projChart = null; }
        if (netChart)  { netChart.destroy();  netChart  = null; }
        await supabase.auth.signOut();
        user = window.currentUser = null;
        showLogin();
      }

      // ══════════════════════════════════════════
      // MAIN APP SHELL
      // ══════════════════════════════════════════

      function showApp() {
        app.innerHTML = `
          <div class="app">

            <!-- HEADER BAR -->
            <div class="topBar">
              <div class="topLeft">
                <div id="todayDate"></div>
                <div id="marketStatus"></div>
              </div>
              <button id="logoutBtn">LOGOUT</button>
            </div>

            <!-- TODAY'S GAIN · MONTHLY DIV · ANNUAL DIV -->
            <div class="cards">
              <div class="card"><div>TODAY'S GAIN</div><h2 id="todayVal">$0</h2></div>
              <div class="card"><div>MONTHLY DIV</div><h2 id="mVal">$0</h2></div>
              <div class="card"><div>ANNUAL DIV</div><h2 id="iVal">$0</h2></div>
            </div>

            <!-- PORTFOLIO TABLE -->
            <div class="tableWrap">
              <div class="header">
                <div class="sticky col">SYMBOL<div class="resizer"></div></div>
                <div class="col">PRICE<div class="resizer"></div></div>
                <div class="col">CHANGE<div class="resizer"></div></div>
                <div class="col">SHARES (INPUT)<div class="resizer"></div></div>
                <div class="col">COST (INPUT)<div class="resizer"></div></div>
                <div class="col">VALUE<div class="resizer"></div></div>
                <div class="col">DIV (INPUT)<div class="resizer"></div></div>
                <div class="col">YIELD<div class="resizer"></div></div>
                <div class="col">INCOME<div class="resizer"></div></div>
              </div>
              <div id="list"></div>
            </div>

            <!-- BOTTOM SECTION: green wrapper -->
            <div class="bottomSection">

              <!-- NET WORTH CHART CARD -->
              <div class="networthCard">
                <div class="netHeader">
                  <h3>🪎 NET WORTH HISTORY</h3>
                  <div class="nwStatCards">
                    <div class="nwStatCard">
                      <div class="label">ASSETS (NET)</div>
                      <div class="value" id="nwAssetsVal">—</div>
                    </div>
                    <div class="nwStatCard" id="nwGainCard">
                      <div class="label">TOTAL GAIN</div>
                      <div class="value" id="nwGainVal">—</div>
                    </div>
                  </div>
                </div>
                <div class="chartBox">
                  <canvas id="networthChart"></canvas>
                </div>
              </div>

              <!-- ENHANCED PROJECTION CARD -->
              <div class="projCard">
                <h3>📈 NET WORTH PROJECTION</h3>

                <!-- Milestone summary: 1Y–40Y, two rows (nominal + real) -->
                <div class="milestoneGrid">
                  <div class="milestoneCell"><div class="mLabel">1Y</div><div class="mNominal" id="proj1y">—</div><div class="mReal" id="proj1yr">—</div></div>
                  <div class="milestoneCell"><div class="mLabel">5Y</div><div class="mNominal" id="proj5y">—</div><div class="mReal" id="proj5yr">—</div></div>
                  <div class="milestoneCell"><div class="mLabel">10Y</div><div class="mNominal" id="proj10y">—</div><div class="mReal" id="proj10yr">—</div></div>
                  <div class="milestoneCell"><div class="mLabel">20Y</div><div class="mNominal" id="proj20y">—</div><div class="mReal" id="proj20yr">—</div></div>
                  <div class="milestoneCell"><div class="mLabel">30Y</div><div class="mNominal" id="proj30y">—</div><div class="mReal" id="proj30yr">—</div></div>
                  <div class="milestoneCell"><div class="mLabel">40Y</div><div class="mNominal" id="proj40y">—</div><div class="mReal" id="proj40yr">—</div></div>
                </div>

      // ══════════════════════════════════════════

      function updateNwStatCards(data) {
        if (!data || !data.length) return;
        const calcNet = d =>
          (d.cash || 0) + (d.retirement || 0) + (d.stocks || 0) +
          (d.properties || 0) - (d.mortgage || 0);
        const latest   = calcNet(data[data.length - 1]);
        const earliest = calcNet(data[0]);
        const gain     = latest - earliest;

        const aEl = document.getElementById("nwAssetsVal");
        const gEl = document.getElementById("nwGainVal");
        if (aEl) aEl.innerText = fmtMoney0(latest);
        if (gEl) {
          gEl.innerText   = (gain >= 0 ? "+" : "") + fmtMoney0(gain);
          gEl.style.color = gain >= 0 ? "#16a34a" : "#dc2626";
        }

        // KEY FIX: seed projBase from your actual Supabase net_worth data.
        // This replaces the portfolio-only total so the projection starts
        // from cash + retirement + stocks + properties - mortgage (latest row).
        projBase = latest;
        nwDataLoaded = true;

        // Seed the Starting Position snap cards in the projection panel
        const last = data[data.length - 1];
        const setSnap = (id, v) => { const el = document.getElementById(id); if (el) el.innerText = fmtMoney0(v); };
        setSnap("snapNW",   latest);
        setSnap("snapPort", (last.stocks || 0) + (last.cash || 0) + (last.retirement || 0));
        setSnap("snapProp", last.properties || 0);
        setSnap("snapMort", last.mortgage   || 0);

        // Re-run projection now that projBase has the correct starting value
        runProjection();
      }

      async function fetchNetworthData() {
        const { data, error } = await supabase
          .from("net_worth")
          .select("*")
          .eq("user_id", user.id)
          .order("date", { ascending: true });
        if (error) { console.error(error); return []; }
        return (data || []).slice().sort((a, b) => a.date.localeCompare(b.date));
      }

      async function initNetworthChart() {
        if (!user) return;
        const data = await fetchNetworthData();
        const ctx  = document.getElementById("networthChart");
        if (!ctx) { setTimeout(initNetworthChart, 200); return; }

        if (netChart) { netChart.destroy(); netChart = null; }
        updateNwStatCards(data);

        const xLabels = data.map(d => {
          const dt = new Date(d.date + "T12:00:00");
          return dt.toLocaleDateString(undefined, { month: "short", year: "numeric" });
        });

        netChart = new Chart(ctx, {
          type: "line",
          data: {
            labels: xLabels,
            datasets: [
              { label: "Cash",       data: data.map(d => d.cash       || 0), borderColor: "#1f77b4", tension: 0.35, fill: false, pointRadius: 3 },
              { label: "Retirement", data: data.map(d => d.retirement || 0), borderColor: "#ff7f0e", tension: 0.35, fill: false, pointRadius: 3 },
              { label: "Stocks",     data: data.map(d => d.stocks     || 0), borderColor: "#2ca02c", tension: 0.35, fill: false, pointRadius: 3 },
              { label: "Properties", data: data.map(d => d.properties || 0), borderColor: "#17becf", tension: 0.35, fill: false, pointRadius: 3 },
              { label: "Mortgage",   data: data.map(d => d.mortgage   || 0), borderColor: "#d62728", tension: 0.35, fill: false, pointRadius: 3 },
              {
                label: "Net Worth",
                data: data.map(d =>
                  (d.cash || 0) + (d.retirement || 0) + (d.stocks || 0) +
                  (d.properties || 0) - (d.mortgage || 0)
                ),
                borderColor: "#9467bd", borderWidth: 3, tension: 0.35, fill: false, pointRadius: 4
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: {
              legend: { position: "bottom", labels: { boxWidth: 12, font: { size: 11 } } },
              tooltip: { callbacks: { label: c => " " + c.dataset.label + ": " + fmtMoney0(c.parsed.y) } }
            },
            scales: {
              y: { ticks: { callback: v => fmtMillions(v), font: { size: 11 } } },
              x: { ticks: { maxTicksLimit: 12, maxRotation: 45, minRotation: 0, font: { size: 10 } } }
            }
          }
        });

      // ══════════════════════════════════════════

      async function loadAll() {
        const { data } = await supabase.from("portfolio").select("*").eq("user_id", user.id);
        portfolio = (data || []).map(r => ({
          id: r.id, symbol: r.symbol,
          shares:     +r.shares     || 0,
          dividend:   +r.dividend   || 0,
          cost:       +r.cost       || 0,
          last_price: +r.last_price || 0,
          position:   r.position    || 0
        }));
        portfolio.sort((a, b) => a.position - b.position);
        symbols = portfolio.map(p => p.symbol);
        render();
        refresh();
        fetchAllQuotes();
      }

      async function saveField(id, field, val) {
        const row = portfolio.find(x => x.id === id);
        if (!row) return;
        row[field] = parseFloat(val.replace(/,/g, "")) || 0;
        refresh();
        await supabase.from("portfolio").update({
          shares: row.shares, dividend: row.dividend, cost: row.cost
        }).eq("id", id);
      }

      async function fetchAllQuotes() {
        try {
          if (!symbols.length) return;
          const res  = await fetch(`https://yxvgevzvrvhtzmfxgitk.functions.supabase.co/quote?symbols=${symbols.join(",")}`);
          const data = await res.json();
          if (!data || typeof data !== "object") return;
          Object.keys(data).forEach(sym => { if (data[sym]?.c) dataMap[sym] = data[sym]; });
          refresh();
        } catch (err) { console.error("Quote fetch error:", err); }
      }

      function createRow(p) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div class="sticky">${p.symbol}</div>
          <div>N/A</div>
          <div>N/A</div>
          <input type="text" inputmode="decimal" value="${p.shares   ? fmtNumber(p.shares)   : ""}">
          <input type="text" inputmode="decimal" value="${p.cost     ? fmtMoney(p.cost)      : ""}">
          <div>$0</div>
          <input type="text" inputmode="decimal" value="${p.dividend ? fmtNumber(p.dividend) : ""}">
          <div>0%</div>
          <div>$0</div>`;

        const del = document.createElement("button");
        del.innerText = "✕";
        del.style.cssText = "margin-right:6px;background:#ef4444;color:white;border:none;border-radius:6px;padding:3px 7px;cursor:pointer;font-family:inherit;";
        del.addEventListener("click", () => deleteRow(p.id));
        row.children[0].prepend(del);

        row.children[3].addEventListener("input", e => saveField(p.id, "shares",   e.target.value));
        row.children[4].addEventListener("input", e => saveField(p.id, "cost",     e.target.value));
        row.children[6].addEventListener("input", e => saveField(p.id, "dividend", e.target.value));

        rows[p.id] = row;
        return row;
      }

      function render() {
        const list = document.getElementById("list");
        list.innerHTML = "";
        rows = {};
        portfolio.forEach(p => list.appendChild(createRow(p)));
      }

      function refresh() {
        let total = 0, incomeTotal = 0, gainTotal = 0, monthlyTotal = 0, dailyGainTotal = 0;

        portfolio.forEach(p => {
          const q   = dataMap[p.symbol];
          const row = rows[p.id];
          if (!row) return;

          for (let i = 0; i < 9; i++) row.children[i].style.background = "transparent";

          const price    = q?.c || p.last_price || 0;
          const shares   = p.shares   || 0;
          const dividend = p.dividend || 0;
          const cost     = p.cost     || 0;
          const val      = price ? price * shares : cost * shares;
          const realGain = val - cost * shares;
          const income   = dividend * shares;
          const change   = (q?.c && q?.pc) ? (q.c - q.pc) : 0;
          const yieldVal = price ? dividend / price : 0;

          total          += val;
          incomeTotal    += income;
          gainTotal      += realGain;
          monthlyTotal   += income / 12;
          dailyGainTotal += change * shares;

          row.children[1].innerText   = price ? fmtMoney(price) : "N/A";
          row.children[2].innerText   = q ? fmtMoney(change) : "N/A";
          row.children[2].style.color = change > 0 ? "#16a34a" : change < 0 ? "#dc2626" : "#999";
          row.children[5].innerText   = fmtMoney(val);
          row.children[5].style.background =
            realGain > 0 ? "#ecfdf5" : realGain < 0 ? "#fef2f2" : "transparent";
          row.children[7].innerText        = fmtPercent(yieldVal);
          row.children[8].innerText        = fmtMoney(income);
          row.children[8].style.background = income > 0 ? "#dbeafe" : "transparent";
          row.children[8].style.color      = income > 0 ? "#1d4ed8" : "#111";
          row.children[8].style.fontWeight = income > 0 ? "600" : "400";
        });

        document.getElementById("iVal").innerText = fmtMoney0(incomeTotal);
        document.getElementById("mVal").innerText = fmtMoney0(monthlyTotal);

        const tEl = document.getElementById("todayVal");
        tEl.innerText   = (dailyGainTotal > 0 ? "+" : "") + fmtMoney0(dailyGainTotal);
        tEl.style.color = dailyGainTotal > 0 ? "#16a34a" : dailyGainTotal < 0 ? "#dc2626" : "#333";

        updateProjection(total);
      }

      // ══════════════════════════════════════════
      // ENHANCED PROJECTION ENGINE
      // ══════════════════════════════════════════

      let projChart = null;
      let projBase  = 0;
      // nwDataLoaded: once Supabase net_worth rows are loaded, portfolio
      // refresh no longer overwrites projBase with the smaller portfolio total.
      let nwDataLoaded = false;

      function updateProjection(portfolioTotal) {
        if (!nwDataLoaded && !isNaN(portfolioTotal)) projBase = portfolioTotal;
        runProjection();
      }

      function initProjection() {
        function wireSlider(sliderId, labelId, fmt) {
          const sl  = document.getElementById(sliderId);
          const lbl = document.getElementById(labelId);
          if (!sl || !lbl) return;
          lbl.innerText = fmt(sl.value);
          sl.addEventListener("input", () => { lbl.innerText = fmt(sl.value); runProjection(); });
        }

        const dollar = v => "$" + Number(v).toLocaleString();
        const pct    = v => parseFloat(v).toFixed(1) + "%";
        const yrs    = v => v + " yrs";
        const age    = v => v;

        wireSlider("slContrib",   "svContrib",   dollar);
        wireSlider("slExpenses",  "svExpenses",  dollar);
        wireSlider("slSS",        "svSS",        dollar);
        wireSlider("slSSAge",     "svSSAge",     age);
        wireSlider("slAge",       "svAge",       age);
        wireSlider("slReturn",    "svReturn",    pct);
        wireSlider("slInflation", "svInflation", pct);
        wireSlider("slHorizon",   "svHorizon",   yrs);
        wireSlider("slVol",       "svVol",       pct);

        document.getElementById("toggleSS").addEventListener("change", e => {
          const on = e.target.checked;
          document.getElementById("ssAgeRow").style.display  = on ? "flex" : "none";
          document.getElementById("ssAgeRow2").style.display = on ? "flex" : "none";
          runProjection();
        });

        document.getElementById("toggleMC").addEventListener("change", e => {
          const on = e.target.checked;
          document.getElementById("mcVolRow").style.display = on ? "flex" : "none";
          document.getElementById("mcLabel").classList.toggle("visible", on);
          document.getElementById("mcLegend").style.display = on ? "flex" : "none";
          runProjection();
        });

        const adviceDefs = {
          advBtn1: {
            title: "💡 GROWTH LEVERS",
            prompt: () => `I have a net worth of ${fmtMoney0(projBase)}, contributing $${document.getElementById("slContrib").value}/yr, spending $${document.getElementById("slExpenses").value}/yr, with ${document.getElementById("slReturn").value}% return and ${document.getElementById("slInflation").value}% inflation over ${document.getElementById("slHorizon").value} years. What are the 3 biggest levers to grow my net worth faster? Be specific and concise.`
          },
          advBtn2: {
            title: "🏖️ SAFE WITHDRAWAL RATE",
            prompt: () => {
              const h = parseInt(document.getElementById("slHorizon").value);
              const r = parseFloat(document.getElementById("slReturn").value);
              const i = parseFloat(document.getElementById("slInflation").value);
              const future = projBase * Math.pow(1 + r / 100, h);
              return `My projected net worth in ${h} years is ${fmtMoney0(future)}. With ${i}% inflation, what is a safe annual withdrawal? Include the 4% rule, inflation impact, and sequence-of-returns risk. Be concise.`;
            }
          },
          advBtn3: {
            title: "📋 SOCIAL SECURITY STRATEGY",
            prompt: () => `I am ${document.getElementById("slAge").value} years old, planning to claim SS at ${document.getElementById("slSSAge").value}, receiving $${document.getElementById("slSS").value}/yr. Net worth: ${fmtMoney0(projBase)}. What is the optimal SS claiming strategy? Consider break-even age, spousal benefits, withdrawal sequencing. Be concise.`
          }
        };

        Object.entries(adviceDefs).forEach(([btnId, def]) => {
          document.getElementById(btnId)?.addEventListener("click", () => fetchAdvice(def));
        });

        runProjection();
      }

      function runProjection() {
        const returnRate = parseFloat(document.getElementById("slReturn")?.value    || 7)    / 100;
        const inflRate   = parseFloat(document.getElementById("slInflation")?.value  || 3)    / 100;
        const horizon    = parseInt(document.getElementById("slHorizon")?.value      || 30);
        const contrib    = parseFloat(document.getElementById("slContrib")?.value    || 24000);
        const expenses   = parseFloat(document.getElementById("slExpenses")?.value   || 60000);
        const ssOn       = document.getElementById("toggleSS")?.checked;
        const ssAmt      = ssOn ? parseFloat(document.getElementById("slSS")?.value  || 0) : 0;
        const ssAge      = ssOn ? parseInt(document.getElementById("slSSAge")?.value  || 67) : 999;
        const curAge     = ssOn ? parseInt(document.getElementById("slAge")?.value    || 60) : 60;
        const mcOn       = document.getElementById("toggleMC")?.checked;
        const vol        = parseFloat(document.getElementById("slVol")?.value        || 12)   / 100;

        const netFlow    = yr => contrib - expenses + (ssOn && (curAge + yr) >= ssAge ? ssAmt : 0);
        const realReturn = (1 + returnRate) / (1 + inflRate) - 1;

        const labels = [], nominal = [], real = [];
        let nVal = projBase, rVal = projBase;

        for (let yr = 0; yr <= horizon; yr++) {
          labels.push(new Date().getFullYear() + yr);
          nominal.push(Math.round(nVal));
          real.push(Math.round(rVal));
          if (yr < horizon) {
            const flow = netFlow(yr + 1);
            nVal = nVal * (1 + returnRate) + flow;
            rVal = rVal * (1 + realReturn) + flow / Math.pow(1 + inflRate, yr + 1);
          }
        }

        let mc10 = [], mc90 = [];
        if (mcOn) {
          const RUNS = 1000;
          const outcomes = Array.from({ length: horizon + 1 }, () => []);
          for (let run = 0; run < RUNS; run++) {
            let v = projBase;
            outcomes[0].push(v);
            for (let yr = 0; yr < horizon; yr++) {
              const u1 = Math.random(), u2 = Math.random();
              const z  = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
              v = v * (1 + returnRate + vol * z) + netFlow(yr + 1);
              outcomes[yr + 1].push(v);
            }
          }
          for (let yr = 0; yr <= horizon; yr++) {
            const s = outcomes[yr].slice().sort((a, b) => a - b);
            mc10.push(Math.round(s[Math.floor(RUNS * 0.10)]));
            mc90.push(Math.round(s[Math.floor(RUNS * 0.90)]));
          }
        }

        // Update milestone cells
        const milestones = { proj1y: 1, proj5y: 5, proj10y: 10, proj20y: 20, proj30y: 30, proj40y: 40 };
        Object.entries(milestones).forEach(([id, y]) => {
          const nEl = document.getElementById(id);
          const rEl = document.getElementById(id + "r");
          if (nEl) nEl.innerText = y <= horizon ? fmtMillions(nominal[y] ?? nominal[nominal.length - 1]) : "—";
          if (rEl) rEl.innerText = y <= horizon ? fmtMillions(real[y]    ?? real[real.length - 1])       : "—";
        });

        drawProjChart(labels, nominal, real, mcOn ? mc10 : null, mcOn ? mc90 : null);
      }

      function drawProjChart(labels, nominal, real, mc10, mc90) {
        const ctx = document.getElementById("projChart");
        if (!ctx) return;
        if (projChart) { projChart.destroy(); projChart = null; }

        const datasets = [];

        if (mc10 && mc90) {
          datasets.push({ label: "90th pct", data: mc90, borderColor: "transparent", backgroundColor: "rgba(22,163,74,0.10)", fill: "+1", tension: 0.35, pointRadius: 0 });
          datasets.push({ label: "10th pct", data: mc10, borderColor: "transparent", backgroundColor: "rgba(22,163,74,0.10)", fill: false, tension: 0.35, pointRadius: 0 });
        }

        datasets.push({ label: "Real", data: real, borderColor: "#9467bd", borderWidth: 2, borderDash: [6, 4], tension: 0.35, fill: false, pointRadius: 0, pointHoverRadius: 4 });
        datasets.push({ label: "Nominal", data: nominal, borderColor: "#16a34a", borderWidth: 2.5, tension: 0.35, fill: false, pointRadius: 0, pointHoverRadius: 4 });

        projChart = new Chart(ctx, {
          type: "line",
          data: { labels, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 200 },
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: c => " " + c.dataset.label + ": " + fmtMoney0(c.parsed.y) } }
            },
            scales: {
              x: { ticks: { maxTicksLimit: 8, font: { size: 10 } } },
              y: { ticks: { callback: v => fmtMillions(v), font: { size: 10 } } }
            }
          }
        });
      }

      async function fetchAdvice(def) {
        const panel   = document.getElementById("advicePanel");
        const titleEl = document.getElementById("adviceTitle");
        const textEl  = document.getElementById("adviceText");
        panel.classList.add("visible");
        titleEl.innerText = def.title;
        textEl.innerText  = "Thinking...";
        try {
          const res  = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 400,
              messages: [{ role: "user", content: def.prompt() }]
            })
          });
          const data = await res.json();
          textEl.innerText = data.content?.[0]?.text || "No response.";
        } catch (err) {
          textEl.innerText = "Could not connect to AI.";
          console.error(err);
        }
      }

      // ══════════════════════════════════════════
      // TOOLBAR + RESIZE
      // ══════════════════════════════════════════

      async function addRow() {
        const symbol = prompt("Enter ticker symbol (e.g. AAPL)");
        if (!symbol) return;
        const { data, error } = await supabase
          .from("portfolio")
          .insert({ user_id: user.id, symbol: symbol.toUpperCase(), shares: 0, dividend: 0, cost: 0 })
          .select().single();
        if (error) { alert(error.message); return; }
        const entry = { id: data.id, symbol: data.symbol, shares: 0, dividend: 0, cost: 0, last_price: 0 };
        portfolio.push(entry);
        symbols.push(data.symbol);
        document.getElementById("list").appendChild(createRow(entry));
        fetchAllQuotes();
      }

      async function deleteRow(id) {
        if (!confirm("Delete this row?")) return;
        await supabase.from("portfolio").delete().eq("id", id);
        portfolio = portfolio.filter(p => p.id !== id);
        if (rows[id]) { rows[id].remove(); delete rows[id]; }
        refresh();
      }

      async function resetOrder() {
        if (!confirm("Sort alphabetically?")) return;
        const { data, error } = await supabase.from("portfolio").select("id, symbol").eq("user_id", user.id);
        if (error) { alert(error.message); return; }
        data.sort((a, b) => a.symbol.localeCompare(b.symbol));
        for (let i = 0; i < data.length; i++) {
          await supabase.from("portfolio").update({ position: i + 1 }).eq("id", data[i].id);
        }
        loadAll();
      }

      function createToolbar() {
        const wrap = document.createElement("div");
        wrap.style.cssText = "display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap;";
        wrap.innerHTML = `
          <button id="addRowBtn" class="toolBtn">➕ <span>ADD SYMBOL</span></button>
          <button id="resetOrderBtn" class="toolBtn blue">🔄 <span>SORT A–Z</span></button>`;
        const table = document.querySelector(".tableWrap");
        table.parentNode.insertBefore(wrap, table);
        document.getElementById("addRowBtn").addEventListener("click", addRow);
        document.getElementById("resetOrderBtn").addEventListener("click", resetOrder);
      }

      function loadWidths() {
        for (let i = 1; i <= 9; i++) {
          const w = localStorage.getItem("col" + i);
          if (w) document.documentElement.style.setProperty(`--c${i}`, w);
        }
      }

      function enableResize() {
        // Resize only on non-touch devices — on mobile, pinch/scroll is more natural
        if ("ontouchstart" in window) return;
        document.querySelectorAll(".header .col").forEach((col, i) => {
          const resizer = col.querySelector(".resizer");
          let startX, startW;
          resizer.addEventListener("mousedown", e => {
            startX = e.clientX; startW = col.offsetWidth;
            document.addEventListener("mousemove", onMove);
            document.addEventListener("mouseup", () =>
              document.removeEventListener("mousemove", onMove), { once: true });
          });
          function onMove(e) {
            const w = Math.max(70, startW + (e.clientX - startX)) + "px";
            document.documentElement.style.setProperty(`--c${i + 1}`, w);
            localStorage.setItem("col" + (i + 1), w);
          }
        });
      }

      // ══════════════════════════════════════════
      // MARKET STATUS
      // ══════════════════════════════════════════

      function updateMarketStatus() {
        const el = document.getElementById("marketStatus");
        if (!el) return;
        const est    = new Date(new Date().toLocaleString("en-US", { timeZone: "America/New_York" }));
        const day = est.getDay(), h = est.getHours(), m = est.getMinutes();
        const isOpen = day > 0 && day < 6 && (h > 9 || (h === 9 && m >= 30)) && h < 16;
        el.innerText = isOpen ? "🟢 Market Open" : "🔴 Market Closed";
        el.className = isOpen ? "market-open"    : "market-closed";
      }

      // ══════════════════════════════════════════
      // INIT
      // ══════════════════════════════════════════

      async function initAuth() {
        showLogin();
        const { data } = await supabase.auth.getSession();
        user = data.session?.user || null;
        if (user) { window.currentUser = user; showApp(); }
      }

      initAuth();

    }); // end window.addEventListener("load")

    // iframe height sync
    function sendHeight() {
      parent.postMessage({ type: "resize", height: document.body.scrollHeight }, "*");
    }
    window.addEventListener("load", sendHeight);
    window.addEventListener("resize", sendHeight);
    setInterval(sendHeight, 800);
  </script>
</body>
</html>
