<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f7f9;
      margin: 0;
      padding-left:  env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      -webkit-text-size-adjust: 100%;
      /* KEY MOBILE FIX: prevent any child from creating horizontal overflow
         on the body itself — this stops the green section from spilling */
      overflow-x: hidden;
    }

    .app {
      padding: 12px 14px;
      max-width: 1400px;
      margin: 0 auto;
      /* Constrain width so nothing bleeds past the viewport */
      width: 100%;
    }

    /* ── LOGIN ── */
    .loginWrap { display: flex; justify-content: center; padding-top: 40px; }

    .loginCard {
      max-width: 420px;
      width: 100%;
      background: white;
      padding: 24px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .loginCard input {
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      width: 100%;
    }

    .loginCard button {
      padding: 14px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── TOP HEADER BAR ── */
    .topBar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(229,231,235,0.6);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .topLeft { display: flex; flex-direction: column; gap: 2px; }

    #todayDate { font-size: 13px; font-weight: 500; color: #1f2937; }

    #marketStatus { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
    .market-open   { color: #16a34a; }
    .market-closed { color: #dc2626; }

    #logoutBtn {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    /* ── SUMMARY CARDS ── */
    .cards {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1 1 90px;
      min-width: 85px;
      padding: 10px 12px;
      background: #ecfdf5;
      border-radius: 10px;
      border: 1px solid #d1fae5;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .card div { font-size: 10px; color: #555; font-weight: 600; letter-spacing: 0.04em; }
    .card h2  { font-size: 15px; margin: 3px 0 0 0; font-weight: 700; }

    /* ── TOOLBAR BUTTONS ── */
    .toolBtn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      font-size: 12px;
      font-family: inherit;
      border: none;
      border-radius: 6px;
      background: #111827;
      color: #e5e7eb;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .toolBtn span { font-weight: 500; }
    .toolBtn.blue { background: #1d4ed8; }

    /* ── PORTFOLIO TABLE ──
       KEY MOBILE FIX: the tableWrap itself scrolls horizontally.
       We isolate it with overflow-x: auto so the scroll stays
       inside the wrapper and doesn't bleed to the body.          */
    .tableWrap {
      width: 100%;
      max-width: 100%;          /* never wider than its container */
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      /* isolate the stacking context so sticky columns
         don't leak outside the rounded border */
      isolation: isolate;
    }

    :root {
      --c1: 130px; --c2: 110px; --c3: 110px;
      --c4: 120px; --c5: 110px; --c6: 110px;
      --c7: 100px; --c8: 90px;  --c9: 110px;
    }

    .header, .row {
      display: grid;
      grid-template-columns:
        var(--c1) var(--c2) var(--c3) var(--c4) var(--c5)
        var(--c6) var(--c7) var(--c8) var(--c9);
      min-width: 990px;
    }

    /* TABLE HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #f9fafb;
      border-bottom: 2px solid #d1d5db;
    }

    .header > div {
      padding: 9px 6px;
      border-right: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #374151;
      background: #f9fafb;
    }

    .header > div:last-child { border-right: none; }

    /* DATA ROWS */
    .row > div {
      padding: 9px 8px;
      border-right: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      font-size: 13px;
    }

    /* STICKY SYMBOL COLUMN
       KEY FIX: use a solid background + box-shadow instead of
       the "0 0 0 1000px white inset" trick which caused the
       columns-visible-left-of-symbol bug on mobile.             */
    .header .sticky {
      position: sticky;
      left: 0;
      z-index: 30;
      background: #f9fafb;
      box-shadow: 3px 0 6px -2px rgba(0,0,0,0.12);
    }

    .row .sticky {
      position: sticky;
      left: 0;
      z-index: 10;
      background: white;
      box-shadow: 3px 0 6px -2px rgba(0,0,0,0.08);
      justify-content: flex-start;
      font-weight: 600;
      font-size: 13px;
    }

    /* Ensure non-sticky cells never overlap the sticky column */
    .row > div:not(.sticky) { position: relative; }

    /* INPUT CELLS — font matches page */
    .row input {
      width: 100%;
      height: 100%;
      padding: 0 4px;
      margin: 0;
      border: none;
      outline: none;
      background: transparent;
      text-align: center;
      font-family: inherit;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: #111;
    }

    @media (max-width: 768px) {
      .row input { font-size: 16px; }
    }

    .row > div:last-child,
    .header > div:last-child { border-right: none; }

    .row { position: relative; z-index: 1; background: white; }
    .row:hover { background: #f9fafb; }

    .col { position: relative; }
    .resizer {
      position: absolute;
      right: -3px;
      top: 0;
      width: 6px;
      height: 100%;
      cursor: col-resize;
    }

    /* ── BOTTOM GREEN SECTION ──
       KEY MOBILE FIX: overflow-x: hidden prevents the white cards
       inside from pushing the green background wider than the screen. */
    .bottomSection {
      margin-top: 16px;
      background: #16a34a;
      padding: 14px 12px 14px;
      border-radius: 14px;
      overflow-x: hidden;   /* KEY FIX */
      width: 100%;
    }

    /* NET WORTH HISTORY CARD */
    .networthCard {
      background: white;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid #e5e7eb;
      margin-top: 16px;
      width: 100%;
      min-width: 0;          /* prevent flex/grid blowout */
    }

    .netHeader {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    /* Both chart titles use the same font size */
    .netHeader h3,
    .projCard h3 {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      margin: 0 0 0 0;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    .projCard h3 { margin: 0 0 14px 0; }

    .nwStatCards { display: flex; gap: 8px; flex-wrap: wrap; }

    .nwStatCard {
      padding: 5px 10px;
      background: #f0fdf4;
      border-radius: 8px;
      border: 1px solid #bbf7d0;
      min-width: 88px;
    }

    .nwStatCard .label { font-size: 9px; color: #6b7280; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    .nwStatCard .value { font-size: 14px; font-weight: 700; color: #111; font-variant-numeric: tabular-nums; }

    .chartBox {
      background: #f3f4f6;
      border-radius: 10px;
      padding: 8px;
      border: 1px solid #e5e7eb;
      height: 280px;
    }

    /* ── PROJECTION CARD ── */
    .projCard {
      background: white;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      margin-top: 12px;
      width: 100%;
      min-width: 0;          /* prevent flex/grid blowout */
    }

    /* Milestone row */
    .milestoneGrid {
      display: flex;
      font-variant-numeric: tabular-nums;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .milestoneCell {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 7px 2px;
      border-right: 1px solid #f3f4f6;
      background: #f9fafb;
      min-width: 0;
    }

    .milestoneCell:last-child { border-right: none; }
    .milestoneCell .mLabel   { font-size: 9px;  font-weight: 700; color: #9ca3af; margin-bottom: 2px; }
    .milestoneCell .mNominal { font-size: 11px; font-weight: 700; color: #111; }
    .milestoneCell .mReal    { font-size: 9px;  color: #9467bd; font-weight: 600; margin-top: 1px; }

    /* Two-column on desktop, stacked on mobile */
    .projLayout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .projLayout { grid-template-columns: 1fr; }
    }

    .projControls { display: flex; flex-direction: column; gap: 12px; min-width: 0; }

    .projSection {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      min-width: 0;
    }

    .projSectionTitle {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .sliderRow {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .sliderRow:last-child { margin-bottom: 0; }

    .sliderLabel {
      font-size: 12px;
      color: #374151;
      flex: 1;
      min-width: 0;
    }

    .sliderRow input[type=range] {
      width: 100px;
      flex-shrink: 0;
      accent-color: #16a34a;
      cursor: pointer;
      height: 20px;
    }

    .sliderVal {
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #111;
      min-width: 52px;
      text-align: right;
    }

    /* Toggle switch */
    .toggleRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
      color: #374151;
      gap: 8px;
    }

    .toggleRow:last-child { margin-bottom: 0; }

    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggleSlider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #d1d5db;
      border-radius: 999px;
      transition: background 0.2s;
    }

    .toggleSlider::before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggleSlider { background: #16a34a; }
    .toggle input:checked + .toggleSlider::before { transform: translateX(16px); }

    /* Snapshot grid */
    .snapGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    .snapItem { background: white; border: 1px solid #e5e7eb; border-radius: 6px; padding: 6px 8px; }
    .snapItem .snapLabel { font-size: 9px; color: #9ca3af; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .snapItem .snapVal   { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; color: #111; margin-top: 1px; }

    /* Tax info note */
    .taxNote {
      font-size: 10px;
      color: #6b7280;
      background: #fef9c3;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 6px 8px;
      margin-top: 6px;
      line-height: 1.5;
    }

    /* Projection chart */
    .projChartBox {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      height: 340px;
      min-width: 0;
    }

    @media (max-width: 768px) {
      .projChartBox { height: 260px; }
      .chartBox     { height: 220px; }
    }

    /* Coming Soon buttons */
    .adviceRow { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

    .comingSoonBtn {
      padding: 7px 12px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      border: 1px dashed #d1d5db;
      border-radius: 6px;
      background: #f9fafb;
      color: #9ca3af;
      cursor: not-allowed;
      user-select: none;
    }

    /* Monte Carlo label */
    .mcLabel { font-size: 10px; color: #9ca3af; margin-top: 4px; display: none; }
    .mcLabel.visible { display: block; }

    /* ── MOBILE OVERRIDES ── */
    @media (max-width: 600px) {
      .app { padding: 8px 10px; }
      #todayDate { font-size: 11px; }
      .cards { gap: 6px; }
      .card  { padding: 8px 8px; }
      .card h2 { font-size: 13px; }
      .milestoneCell .mNominal { font-size: 10px; }
      .milestoneCell .mReal    { font-size: 9px; }
      .sliderRow { flex-wrap: wrap; }
      .sliderLabel { width: 100%; }
      .sliderRow input[type=range] { width: 100%; }
      .sliderVal { min-width: 40px; }
    }

  </style>
</head>

<body>
  <div id="app">Loading...</div>

  <script>
    window.addEventListener("load", () => {

      const app = document.getElementById("app");

      const supabase = window.supabase.createClient(
        "https://yxvgevzvrvhtzmfxgitk.supabase.co",
        "sb_publishable_d2n-HOcVv50_yjKAro-eLg_WCt2kelh",
        { auth: { persistSession: true, storage: window.localStorage } }
      );
      window.supabaseClient = supabase;

      let user = null, symbols = [], portfolio = [], dataMap = {}, rows = {};
      let netChart = null, quoteInterval = null, marketInterval = null;

      const fmtMoney   = n => "$" + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const fmtMoney0  = n => "$" + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      const fmtNumber  = n => (n || 0).toLocaleString(undefined, { minimumFractionDigits: 3, maximumFractionDigits: 3 });
      const fmtPercent = n => (n * 100).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "%";

      function fmtMillions(v) {
        const abs = Math.abs(v);
        if (abs >= 1_000_000_000) return "$" + (v / 1_000_000_000).toFixed(1).replace(/\.0$/, "") + "B";
        if (abs >= 1_000_000)     return "$" + (v / 1_000_000).toFixed(1).replace(/\.0$/, "") + "M";
        if (abs >= 1_000)         return "$" + (v / 1_000).toFixed(0) + "K";
        return "$" + v.toLocaleString();
      }

      // ══════════════════════════════════════════
      // AUTH
      // ══════════════════════════════════════════

      function showLogin() {
        app.innerHTML = `
          <div class="loginWrap">
            <div class="loginCard">
              <h2 style="margin:0 0 4px;font-size:22px;">Login</h2>
              <input id="emailInput" type="email" placeholder="Email" autocomplete="email">
              <input id="passInput" type="password" placeholder="Password" autocomplete="current-password">
              <button id="loginBtn">LOGIN</button>
              <p id="msg" style="color:#dc2626;font-size:13px;margin:0;min-height:18px;"></p>
            </div>
          </div>`;
        document.getElementById("loginBtn").addEventListener("click", login);
        document.getElementById("passInput").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
      }

      async function login() {
        const email = document.getElementById("emailInput").value.trim();
        const pass  = document.getElementById("passInput").value;
        const msg   = document.getElementById("msg");
        msg.innerText = "";
        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
        if (error) { msg.innerText = error.message; return; }
        user = data.user; window.currentUser = user;
        showApp();
      }

      async function logout() {
        clearInterval(quoteInterval); clearInterval(marketInterval);
        quoteInterval = marketInterval = null;
        if (projChart) { projChart.destroy(); projChart = null; }
        if (netChart)  { netChart.destroy();  netChart  = null; }
        await supabase.auth.signOut();
        user = window.currentUser = null;
        showLogin();
      }

      // ══════════════════════════════════════════
      // MAIN APP SHELL
      // ══════════════════════════════════════════

      function showApp() {
        app.innerHTML = `
          <div class="app">

            <div class="topBar">
              <div class="topLeft">
                <div id="todayDate"></div>
                <div id="marketStatus"></div>
              </div>
              <button id="logoutBtn">LOGOUT</button>
            </div>

            <!-- TODAY'S GAIN · MONTHLY DIV · ANNUAL DIV -->
            <div class="cards">
              <div class="card"><div>TODAY'S GAIN</div><h2 id="todayVal">$0</h2></div>
              <div class="card"><div>MONTHLY DIV</div><h2 id="mVal">$0</h2></div>
              <div class="card"><div>ANNUAL DIV</div><h2 id="iVal">$0</h2></div>
            </div>

            <!-- PORTFOLIO TABLE -->
            <div class="tableWrap">
              <div class="header">
                <div class="sticky col">SYMBOL<div class="resizer"></div></div>
                <div class="col">PRICE<div class="resizer"></div></div>
                <div class="col">CHANGE<div class="resizer"></div></div>
                <div class="col">SHARES (INPUT)<div class="resizer"></div></div>
                <div class="col">COST (INPUT)<div class="resizer"></div></div>
                <div class="col">VALUE<div class="resizer"></div></div>
                <div class="col">DIV (INPUT)<div class="resizer"></div></div>
                <div class="col">YIELD<div class="resizer"></div></div>
                <div class="col">INCOME<div class="resizer"></div></div>
              </div>
              <div id="list"></div>
            </div>

            <!-- GREEN WRAPPER -->
            <div class="bottomSection">

              <!-- 🪎 NET WORTH HISTORY CHART -->
              <div class="networthCard">
                <div class="netHeader">
                  <h3>🪎 NET WORTH HISTORY</h3>
                  <div class="nwStatCards">
                    <div class="nwStatCard">
                      <div class="label">ASSETS (NET)</div>
                      <div class="value" id="nwAssetsVal">—</div>
                    </div>
                    <div class="nwStatCard">
                      <div class="label">TOTAL GAIN</div>
                      <div class="value" id="nwGainVal">—</div>
                    </div>
                  </div>
                </div>
                <div class="chartBox">
                  <canvas id="networthChart"></canvas>
                </div>
              </div>

              <!-- 📈 NET WORTH PROJECTION -->
              <div class="projCard">
                <h3>📈 NET WORTH PROJECTION</h3>

                <!-- Milestone summary 1Y–40Y -->
                <div class="milestoneGrid">
                  <div class="milestoneCell"><div class="mLabel">1Y</div><div class="mNominal" id="proj1y">—</div><div class="mReal" id="proj1yr">—</div></div>
                  <div class="milestoneCell"><div class="mLabel">5Y</div><div class="mNominal" id="proj5y">—</div><div class="mReal" id="proj5yr">—</div></div>
                  <div class="milestoneCell"><div class="mLabel">10Y</div><div class="mNominal" id="proj10y">—</div><div class="mReal" id="proj10yr">—</div></div>
                  <div class="milestoneCell"><div class="mLabel">20Y</div><div class="mNominal" id="proj20y">—</div><div class="mReal" id="proj20yr">—</div></div>
                  <div class="milestoneCell"><div class="mLabel">30Y</div><div class="mNominal" id="proj30y">—</div><div class="mReal" id="proj30yr">—</div></div>
                  <div class="milestoneCell"><div class="mLabel">40Y</div><div class="mNominal" id="proj40y">—</div><div class="mReal" id="proj40yr">—</div></div>
                </div>
                <div style="display:flex;gap:14px;font-size:10px;color:#9ca3af;margin-bottom:12px;flex-wrap:wrap;">
                  <span>⬛ Nominal (top)</span>
                  <span style="color:#9467bd;">■ Real / inflation-adjusted (bottom)</span>
                </div>

                <div class="projLayout">

                  <!-- LEFT: Controls -->
                  <div class="projControls">

                    <!-- Starting Position -->
                    <div class="projSection">
                      <div class="projSectionTitle">📌 Starting Position</div>

      function updateNwStatCards(data) {
        if (!data || !data.length) return;
        const calcNet = d =>
          (d.cash || 0) + (d.retirement || 0) + (d.stocks || 0) +
          (d.properties || 0) - (d.mortgage || 0);
        const latest   = calcNet(data[data.length - 1]);
        const earliest = calcNet(data[0]);
        const gain     = latest - earliest;

        const aEl = document.getElementById("nwAssetsVal");
        const gEl = document.getElementById("nwGainVal");
        if (aEl) aEl.innerText = fmtMoney0(latest);
        if (gEl) {
          gEl.innerText   = (gain >= 0 ? "+" : "") + fmtMoney0(gain);
          gEl.style.color = gain >= 0 ? "#16a34a" : "#dc2626";
        }

        // Seed projection from real Supabase net_worth data
        projBase     = latest;
        nwDataLoaded = true;

        const last = data[data.length - 1];
        const setSnap = (id, v) => { const el = document.getElementById(id); if (el) el.innerText = fmtMoney0(v); };
        setSnap("snapNW",   latest);
        setSnap("snapPort", (last.stocks || 0) + (last.cash || 0) + (last.retirement || 0));
        setSnap("snapProp", last.properties || 0);
        setSnap("snapMort", last.mortgage   || 0);

        runProjection();
      }

      async function loadAll() {
        const { data } = await supabase.from("portfolio").select("*").eq("user_id", user.id);
        portfolio = (data || []).map(r => ({
          id: r.id, symbol: r.symbol,
          shares: +r.shares || 0, dividend: +r.dividend || 0,
          cost: +r.cost || 0, last_price: +r.last_price || 0, position: r.position || 0
        }));
        portfolio.sort((a, b) => a.position - b.position);
        symbols = portfolio.map(p => p.symbol);
        render(); refresh(); fetchAllQuotes();
      }

      async function saveField(id, field, val) {
        const row = portfolio.find(x => x.id === id);
        if (!row) return;
        row[field] = parseFloat(val.replace(/,/g, "")) || 0;
        refresh();
        await supabase.from("portfolio").update({
          shares: row.shares, dividend: row.dividend, cost: row.cost
        }).eq("id", id);
      }

      async function fetchAllQuotes() {
        try {
          if (!symbols.length) return;
          const res  = await fetch(`https://yxvgevzvrvhtzmfxgitk.functions.supabase.co/quote?symbols=${symbols.join(",")}`);
          const data = await res.json();
          if (!data || typeof data !== "object") return;
          Object.keys(data).forEach(sym => { if (data[sym]?.c) dataMap[sym] = data[sym]; });
          refresh();
        } catch (err) { console.error("Quote fetch error:", err); }
      }

      function createRow(p) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div class="sticky">${p.symbol}</div>
          <div>N/A</div><div>N/A</div>
          <input type="text" inputmode="decimal" value="${p.shares   ? fmtNumber(p.shares)   : ""}">
          <input type="text" inputmode="decimal" value="${p.cost     ? fmtMoney(p.cost)      : ""}">
          <div>$0</div>
          <input type="text" inputmode="decimal" value="${p.dividend ? fmtNumber(p.dividend) : ""}">
          <div>0%</div><div>$0</div>`;

        const del = document.createElement("button");
        del.innerText = "✕";
        del.style.cssText = "margin-right:6px;background:#ef4444;color:white;border:none;border-radius:6px;padding:3px 7px;cursor:pointer;font-family:inherit;";
        del.addEventListener("click", () => deleteRow(p.id));
        row.children[0].prepend(del);

        row.children[3].addEventListener("input", e => saveField(p.id, "shares",   e.target.value));
        row.children[4].addEventListener("input", e => saveField(p.id, "cost",     e.target.value));
        row.children[6].addEventListener("input", e => saveField(p.id, "dividend", e.target.value));

        rows[p.id] = row;
        return row;
      }

      function render() {
        const list = document.getElementById("list");
        list.innerHTML = ""; rows = {};
        portfolio.forEach(p => list.appendChild(createRow(p)));
      }

      function refresh() {
        let total = 0, incomeTotal = 0, monthlyTotal = 0, dailyGainTotal = 0;

        portfolio.forEach(p => {
          const q   = dataMap[p.symbol];
          const row = rows[p.id];
          if (!row) return;

          for (let i = 0; i < 9; i++) row.children[i].style.background = "transparent";

          const price    = q?.c || p.last_price || 0;
          const shares   = p.shares || 0;
          const dividend = p.dividend || 0;
          const cost     = p.cost || 0;
          const val      = price ? price * shares : cost * shares;
          const realGain = val - cost * shares;
          const income   = dividend * shares;
          const change   = (q?.c && q?.pc) ? (q.c - q.pc) : 0;
          const yieldVal = price ? dividend / price : 0;

          total          += val;
          incomeTotal    += income;
          monthlyTotal   += income / 12;
          dailyGainTotal += change * shares;

          row.children[1].innerText   = price ? fmtMoney(price) : "N/A";
          row.children[2].innerText   = q ? fmtMoney(change) : "N/A";
          row.children[2].style.color = change > 0 ? "#16a34a" : change < 0 ? "#dc2626" : "#999";
          row.children[5].innerText   = fmtMoney(val);
          row.children[5].style.background = realGain > 0 ? "#ecfdf5" : realGain < 0 ? "#fef2f2" : "transparent";
          row.children[7].innerText   = fmtPercent(yieldVal);
          row.children[8].innerText   = fmtMoney(income);
          row.children[8].style.background = income > 0 ? "#dbeafe" : "transparent";
          row.children[8].style.color      = income > 0 ? "#1d4ed8" : "#111";
          row.children[8].style.fontWeight = income > 0 ? "600" : "400";
        });

        document.getElementById("iVal").innerText = fmtMoney0(incomeTotal);
        document.getElementById("mVal").innerText = fmtMoney0(monthlyTotal);

        const tEl = document.getElementById("todayVal");
        tEl.innerText   = (dailyGainTotal > 0 ? "+" : "") + fmtMoney0(dailyGainTotal);
        tEl.style.color = dailyGainTotal > 0 ? "#16a34a" : dailyGainTotal < 0 ? "#dc2626" : "#333";

        updateProjection(total);
      }

      // ══════════════════════════════════════════
      // ENHANCED PROJECTION ENGINE
      // ══════════════════════════════════════════

      let projChart    = null;
      let projBase     = 0;
      let nwDataLoaded = false;

      function updateProjection(portfolioTotal) {
        if (!nwDataLoaded && !isNaN(portfolioTotal)) projBase = portfolioTotal;
        runProjection();
      }

      function initProjection() {
        function wire(id, lblId, fmt) {
          const sl  = document.getElementById(id);
          const lbl = document.getElementById(lblId);
          if (!sl || !lbl) return;
          lbl.innerText = fmt(sl.value);
          sl.addEventListener("input", () => { lbl.innerText = fmt(sl.value); runProjection(); });
        }

        const dollar = v => "$" + Number(v).toLocaleString();
        const pct    = v => parseFloat(v).toFixed(1) + "%";
        const pctInt = v => v + "%";
        const yrs    = v => v + " yrs";
        const age    = v => v;

        wire("slContrib",     "svContrib",     dollar);
        wire("slExpenses",    "svExpenses",    dollar);
        wire("slSS",          "svSS",          dollar);
        wire("slAge",         "svAge",         age);
        wire("slSSAge",       "svSSAge",       age);
        wire("slSpouseSS",    "svSpouseSS",    dollar);
        wire("slSpouseAge",   "svSpouseAge",   age);
        wire("slSpouseSSAge", "svSpouseSSAge", age);
        wire("slReturn",      "svReturn",      pct);
        wire("slInflation",   "svInflation",   pct);
        wire("slHorizon",     "svHorizon",     yrs);
        wire("slTax",         "svTax",         pctInt);
        wire("slVol",         "svVol",         pct);

        // SS toggle
        document.getElementById("toggleSS").addEventListener("change", e => {
          document.getElementById("ssBlock").style.display = e.target.checked ? "block" : "none";
          if (!e.target.checked) {
            document.getElementById("toggleSpouseSS").checked = false;
            document.getElementById("spouseSsBlock").style.display = "none";
          }
          runProjection();
        });

        // Spouse SS toggle
        document.getElementById("toggleSpouseSS").addEventListener("change", e => {
          document.getElementById("spouseSsBlock").style.display = e.target.checked ? "block" : "none";
          runProjection();
        });

        // Monte Carlo toggle
        document.getElementById("toggleMC").addEventListener("change", e => {
          const on = e.target.checked;
          document.getElementById("mcVolRow").style.display = on ? "flex" : "none";
          document.getElementById("mcLabel").classList.toggle("visible", on);
          document.getElementById("mcLegend").style.display = on ? "flex" : "none";
          runProjection();
        });

        runProjection();
      }

      function runProjection() {
        // Read all slider values
        const grossReturn = parseFloat(document.getElementById("slReturn")?.value    || 7)    / 100;
        const inflRate    = parseFloat(document.getElementById("slInflation")?.value  || 3)    / 100;
        const horizon     = parseInt(document.getElementById("slHorizon")?.value      || 30);
        const taxRate     = parseFloat(document.getElementById("slTax")?.value        || 22)   / 100;
        const contrib     = parseFloat(document.getElementById("slContrib")?.value    || 24000);
        const expenses    = parseFloat(document.getElementById("slExpenses")?.value   || 60000);
        const mcOn        = document.getElementById("toggleMC")?.checked;
        const vol         = parseFloat(document.getElementById("slVol")?.value        || 12)   / 100;

        // After-tax return: taxes reduce the annual investment gain
        // e.g. 7% gross × (1 - 22% tax) = 5.46% after-tax
        const afterTaxReturn = grossReturn * (1 - taxRate);

        // SS — person 1
        const ssOn    = document.getElementById("toggleSS")?.checked;
        const ssAmt   = ssOn ? parseFloat(document.getElementById("slSS")?.value    || 0) * (1 - taxRate) : 0;
        const ssAge   = ssOn ? parseInt(document.getElementById("slSSAge")?.value   || 67) : 999;
        const curAge  = ssOn ? parseInt(document.getElementById("slAge")?.value     || 60) : 60;

        // SS — spouse
        const spouseOn      = ssOn && document.getElementById("toggleSpouseSS")?.checked;
        const spouseSSAmt   = spouseOn ? parseFloat(document.getElementById("slSpouseSS")?.value    || 0) * (1 - taxRate) : 0;
        const spouseSSAge   = spouseOn ? parseInt(document.getElementById("slSpouseSSAge")?.value   || 67) : 999;
        const spouseAge     = spouseOn ? parseInt(document.getElementById("slSpouseAge")?.value     || 60) : 60;

        // After-tax contributions and expenses
        const afterTaxContrib   = contrib * (1 - taxRate);
        const netFlow = yr => {
          const mySSIncome     = (ssOn    && (curAge    + yr) >= ssAge)     ? ssAmt     : 0;
          const spouseSSIncome = (spouseOn && (spouseAge + yr) >= spouseSSAge) ? spouseSSAmt : 0;
          return afterTaxContrib - expenses + mySSIncome + spouseSSIncome;
        };

        // Real after-tax return strips out inflation
        const realReturn = (1 + afterTaxReturn) / (1 + inflRate) - 1;

        const labels = [], nominal = [], real = [], afterTax = [];
        let nVal = projBase, rVal = projBase, atVal = projBase;

        for (let yr = 0; yr <= horizon; yr++) {
          labels.push(new Date().getFullYear() + yr);
          nominal.push(Math.round(nVal));
          real.push(Math.round(rVal));
          afterTax.push(Math.round(atVal));

          if (yr < horizon) {
            const flow       = netFlow(yr + 1);
            const grossFlow  = contrib - expenses +
              (ssOn    && (curAge    + yr + 1) >= ssAge      ? parseFloat(document.getElementById("slSS")?.value    || 0) : 0) +
              (spouseOn && (spouseAge + yr + 1) >= spouseSSAge ? parseFloat(document.getElementById("slSpouseSS")?.value || 0) : 0);

            // Nominal (gross return, pre-tax — optimistic ceiling)
            nVal = nVal * (1 + grossReturn) + grossFlow;
            // Real (after-tax return, inflation-adjusted)
            rVal = rVal * (1 + realReturn) + flow / Math.pow(1 + inflRate, yr + 1);
            // After-tax nominal (after-tax return, nominal dollars)
            atVal = atVal * (1 + afterTaxReturn) + flow;
          }
        }

        // Monte Carlo on the after-tax nominal line
        let mc10 = [], mc90 = [];
        if (mcOn) {
          const RUNS = 1000;
          const outcomes = Array.from({ length: horizon + 1 }, () => []);
          for (let run = 0; run < RUNS; run++) {
            let v = projBase;
            outcomes[0].push(v);
            for (let yr = 0; yr < horizon; yr++) {
              const u1 = Math.random(), u2 = Math.random();
              const z  = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
              v = v * (1 + afterTaxReturn + vol * z) + netFlow(yr + 1);
              outcomes[yr + 1].push(v);
            }
          }
          for (let yr = 0; yr <= horizon; yr++) {
            const s = outcomes[yr].slice().sort((a, b) => a - b);
            mc10.push(Math.round(s[Math.floor(RUNS * 0.10)]));
            mc90.push(Math.round(s[Math.floor(RUNS * 0.90)]));
          }
        }

        // Update milestone cells (nominal top, real bottom)
        const milestones = { proj1y: 1, proj5y: 5, proj10y: 10, proj20y: 20, proj30y: 30, proj40y: 40 };
        Object.entries(milestones).forEach(([id, y]) => {
          const nEl = document.getElementById(id);
          const rEl = document.getElementById(id + "r");
          if (nEl) nEl.innerText = y <= horizon ? fmtMillions(nominal[y]  ?? nominal[nominal.length - 1])  : "—";
          if (rEl) rEl.innerText = y <= horizon ? fmtMillions(real[y]     ?? real[real.length - 1])        : "—";
        });

        drawProjChart(labels, nominal, real, afterTax, mcOn ? mc10 : null, mcOn ? mc90 : null);
      }

      function drawProjChart(labels, nominal, real, afterTax, mc10, mc90) {
        const ctx = document.getElementById("projChart");
        if (!ctx) return;
        if (projChart) { projChart.destroy(); projChart = null; }

        const datasets = [];

        if (mc10 && mc90) {
          datasets.push({ label: "90th pct", data: mc90, borderColor: "transparent", backgroundColor: "rgba(22,163,74,0.10)", fill: "+1", tension: 0.35, pointRadius: 0 });
          datasets.push({ label: "10th pct", data: mc10, borderColor: "transparent", backgroundColor: "rgba(22,163,74,0.10)", fill: false, tension: 0.35, pointRadius: 0 });
        }

        // After-tax nominal — amber dashed
        datasets.push({
          label: "After-tax nominal",
          data: afterTax,
          borderColor: "#f59e0b",
          borderWidth: 2,
          borderDash: [5, 4],
          tension: 0.35,
          fill: false,
          pointRadius: 0,
          pointHoverRadius: 4
        });

        // Real (after-tax, inflation-adjusted) — purple dashed
        datasets.push({
          label: "Real (after-tax + inflation)",
          data: real,
          borderColor: "#9467bd",
          borderWidth: 2,
          borderDash: [6, 4],
          tension: 0.35,
          fill: false,
          pointRadius: 0,
          pointHoverRadius: 4
        });

        // Nominal (gross, pre-tax) — solid green ceiling
        datasets.push({
          label: "Nominal (pre-tax)",
          data: nominal,
          borderColor: "#16a34a",
          borderWidth: 2.5,
          tension: 0.35,
          fill: false,
          pointRadius: 0,
          pointHoverRadius: 4
        });

        projChart = new Chart(ctx, {
          type: "line",
          data: { labels, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 200 },
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: c => " " + c.dataset.label + ": " + fmtMoney0(c.parsed.y) } }
            },
            scales: {
              x: { ticks: { maxTicksLimit: 8, font: { size: 10 } } },
              y: { ticks: { callback: v => fmtMillions(v), font: { size: 10 } } }
            }
          }
        });
      }

      // ══════════════════════════════════════════
      // TOOLBAR + PORTFOLIO ACTIONS
      // ══════════════════════════════════════════

      async function addRow() {
        const symbol = prompt("Enter ticker symbol (e.g. AAPL)");
        if (!symbol) return;
        const { data, error } = await supabase
          .from("portfolio")
          .insert({ user_id: user.id, symbol: symbol.toUpperCase(), shares: 0, dividend: 0, cost: 0 })
          .select().single();
        if (error) { alert(error.message); return; }
        const entry = { id: data.id, symbol: data.symbol, shares: 0, dividend: 0, cost: 0, last_price: 0 };
        portfolio.push(entry);
        symbols.push(data.symbol);
        document.getElementById("list").appendChild(createRow(entry));
        fetchAllQuotes();
      }

      async function deleteRow(id) {
        if (!confirm("Delete this row?")) return;
        await supabase.from("portfolio").delete().eq("id", id);
        portfolio = portfolio.filter(p => p.id !== id);
        if (rows[id]) { rows[id].remove(); delete rows[id]; }
        refresh();
      }

      async function resetOrder() {
        if (!confirm("Sort alphabetically?")) return;
        const { data, error } = await supabase.from("portfolio").select("id, symbol").eq("user_id", user.id);
        if (error) { alert(error.message); return; }
        data.sort((a, b) => a.symbol.localeCompare(b.symbol));
        for (let i = 0; i < data.length; i++) {
          await supabase.from("portfolio").update({ position: i + 1 }).eq("id", data[i].id);
        }
        loadAll();
      }

      function createToolbar() {
        const wrap = document.createElement("div");
        wrap.style.cssText = "display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap;";
        wrap.innerHTML = `
          <button id="addRowBtn" class="toolBtn">➕ <span>ADD SYMBOL</span></button>
          <button id="resetOrderBtn" class="toolBtn blue">🔄 <span>SORT A–Z</span></button>`;
        const table = document.querySelector(".tableWrap");
        table.parentNode.insertBefore(wrap, table);
        document.getElementById("addRowBtn").addEventListener("click", addRow);
        document.getElementById("resetOrderBtn").addEventListener("click", resetOrder);
      }

      function loadWidths() {
        for (let i = 1; i <= 9; i++) {
          const w = localStorage.getItem("col" + i);
          if (w) document.documentElement.style.setProperty(`--c${i}`, w);
        }
      }

      function enableResize() {
        if ("ontouchstart" in window) return;
        document.querySelectorAll(".header .col").forEach((col, i) => {
          const resizer = col.querySelector(".resizer");
          let startX, startW;
          resizer.addEventListener("mousedown", e => {
            startX = e.clientX; startW = col.offsetWidth;
            document.addEventListener("mousemove", onMove);
            document.addEventListener("mouseup", () =>
              document.removeEventListener("mousemove", onMove), { once: true });
          });
          function onMove(e) {
            const w = Math.max(70, startW + (e.clientX - startX)) + "px";
            document.documentElement.style.setProperty(`--c${i + 1}`, w);
            localStorage.setItem("col" + (i + 1), w);
          }
        });
      }

      // ══════════════════════════════════════════
      // MARKET STATUS
      // ══════════════════════════════════════════

      function updateMarketStatus() {
        const el = document.getElementById("marketStatus");
        if (!el) return;
        const est    = new Date(new Date().toLocaleString("en-US", { timeZone: "America/New_York" }));
        const day = est.getDay(), h = est.getHours(), m = est.getMinutes();
        const isOpen = day > 0 && day < 6 && (h > 9 || (h === 9 && m >= 30)) && h < 16;
        el.innerText = isOpen ? "🟢 Market Open" : "🔴 Market Closed";
        el.className = isOpen ? "market-open"    : "market-closed";
      }

      // ══════════════════════════════════════════
      // INIT
      // ══════════════════════════════════════════

      async function initAuth() {
        showLogin();
        const { data } = await supabase.auth.getSession();
        user = data.session?.user || null;
        if (user) { window.currentUser = user; showApp(); }
      }

      initAuth();

    }); // end window load

    function sendHeight() {
      parent.postMessage({ type: "resize", height: document.body.scrollHeight }, "*");
    }
    window.addEventListener("load", sendHeight);
    window.addEventListener("resize", sendHeight);
    setInterval(sendHeight, 800);
  </script>
</body>
