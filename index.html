<script>
window.addEventListener("load", () => {

const app = document.getElementById("app");

const supabase = window.supabase.createClient(
  "https://yxvgevzvrvhtzmfxgitk.supabase.co",
  "sb_publishable_d2n-HOcVv50_yjKAro-eLg_WCt2kelh",
  {
    auth: {
      persistSession: true,
      storage: window.localStorage
    }
  }
);

let user = null;
let portfolio = {}, symbols = [], rows = {};
let currentRate = 0.10; // ✅ single source of truth

const fmtMoney = n => "$" + (n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoney0 = n => "$" + (n||0).toLocaleString();

async function logout(){
  await supabase.auth.signOut();
  user = null;
  showLogin();
}

function showLogin(){
  app.innerHTML = `
  <div class="loginWrap">
    <div class="loginCard">
      <h2>Login</h2>
      <input id="email" placeholder="Email">
      <input id="pass" type="password" placeholder="Password">

      <label style="display:flex;gap:8px;font-size:13px;">
        <input type="checkbox" id="rememberMe"> Remember Me
      </label>

      <button id="loginBtn">Login</button>
      <p id="msg"></p>
    </div>
  </div>`;

  const saved = localStorage.getItem("rememberEmail");
  if(saved){
    email.value = saved;
    rememberMe.checked = true;
  }

  loginBtn.onclick = login;
}

async function login(){
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: pass.value
  });

  if(error){
    msg.innerText = error.message;
    return;
  }

  if(rememberMe.checked){
    localStorage.setItem("rememberEmail", email.value);
  } else {
    localStorage.removeItem("rememberEmail");
  }

  user = data.user;
  showApp();
}

function showApp(){
  app.innerHTML = `
  <div class="app">

    <div class="cards">
      <div class="card"><div>ASSETS</div><h2 id="pVal">$0</h2></div>
      <div class="card"><div>MONTHLY</div><h2 id="mVal">$0</h2></div>
      <div class="card"><div>ANNUAL</div><h2 id="iVal">$0</h2></div>
      <button id="logoutBtn">Logout</button>
    </div>

    <div id="list"></div>

    <div class="bottomCards">

      <!-- NET WORTH -->
      <div class="netWorthCard">
        <h3>NET WORTH</h3>
        <input id="cash" placeholder="Cash">
        <input id="realEstate" placeholder="Real Estate">
        <input id="debt" placeholder="Debt">
        <h2 id="netVal">$0</h2>
      </div>

      <!-- PROJECTION -->
      <div class="projectionCard">
        <h3>
          PROJECTION
          <span>
            <button onclick="setRate(0.05)">5%</button>
            <button onclick="setRate(0.10)">10%</button>
            <button onclick="setRate(0.15)">15%</button>
          </span>
        </h3>

        <div id="proj1y"></div>
        <div id="proj5y"></div>
        <div id="proj10y"></div>
        <div id="proj20y"></div>
        <div id="proj30y"></div>
        <div id="proj40y"></div>
      </div>

    </div>
  </div>`;

  logoutBtn.onclick = logout;

  cash.oninput = refresh;
  realEstate.oninput = refresh;
  debt.oninput = refresh;

  loadAll();
}

async function loadAll(){
  const { data } = await supabase
    .from("portfolio")
    .select("*")
    .eq("user_id", user.id);

  portfolio = {};
  (data || []).forEach(r => portfolio[r.symbol] = r);

  symbols = Object.keys(portfolio);
  refresh();
}

function updateProjection(total){
  const r = currentRate;

  const calc = y => total * Math.pow(1 + r, y);

  proj1y.innerText  = "1Y → "  + fmtMoney0(calc(1));
  proj5y.innerText  = "5Y → "  + fmtMoney0(calc(5));
  proj10y.innerText = "10Y → " + fmtMoney0(calc(10));
  proj20y.innerText = "20Y → " + fmtMoney0(calc(20));
  proj30y.innerText = "30Y → " + fmtMoney0(calc(30));
  proj40y.innerText = "40Y → " + fmtMoney0(calc(40));
}

function refresh(){
  let total = 0, annual = 0, monthly = 0;

  symbols.forEach(s=>{
    let d = portfolio[s] || {};
    let price = 100; // placeholder

    let val = price * (d.shares || 0);
    let income = (d.dividend || 0) * (d.shares || 0);

    total += val;
    annual += income;
    monthly += income / 12;
  });

  pVal.innerText = fmtMoney0(total);
  iVal.innerText = fmtMoney0(annual);
  mVal.innerText = fmtMoney0(monthly);

  updateProjection(total);

  let net =
    total +
    (+cash.value || 0) +
    (+realEstate.value || 0) -
    (+debt.value || 0);

  netVal.innerText = fmtMoney0(net);
}

/* ✅ THIS is the ONLY rate function */
window.setRate = function(r){
  currentRate = r;
  refresh();
};

async function start(){
  const { data } = await supabase.auth.getSession();
  user = data.session?.user;

  if(user){
    showApp();
  } else {
    showLogin();
  }
}

start();

});
</script>
