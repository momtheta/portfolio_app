<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{font-family:Inter;background:#f5f7f9;margin:0}
.app{padding:16px;max-width:1400px;margin:auto}

.cards{display:flex;gap:10px;margin-bottom:10px}
.card{flex:1;background:#f0fdf4;padding:12px;border-radius:10px}
.card h2{font-size:18px;margin:4px 0}

.section{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-top:16px;
}

input{padding:6px;border:1px solid #ddd;border-radius:6px;width:120px}
</style>

</head>

<body>
<div id="app">Loading...</div>

<script>
window.addEventListener("load",()=>{

const app=document.getElementById("app");

const supabase=window.supabase.createClient(
"https://yxvgevzvrvhtzmfxgitk.supabase.co",
"sb_publishable_d2n-HOcVv50_yjKAro-eLg_WCt2kelh"
);

let user=null, portfolio={}, extraAssets={
cash:0, realEstate:0, crypto:0, other:0
};

/* ---------- FORMAT ---------- */
const fmt=n=>"$"+(n||0).toLocaleString();

/* ---------- LOGIN ---------- */
function showLogin(){
app.innerHTML=`
<div style="display:flex;justify-content:center;margin-top:60px">
<div style="background:white;padding:20px;border-radius:10px">
<input id="email"><br><br>
<input id="pass" type="password"><br><br>
<button id="loginBtn">Login</button>
</div></div>`;
loginBtn.onclick=login;
}

async function login(){
const {data}=await supabase.auth.signInWithPassword({
email:email.value,password:pass.value});
user=data.user;
showApp();
}

/* ---------- APP ---------- */
function showApp(){
app.innerHTML=`
<div class="app">

<div class="cards">
<div class="card"><div>STOCKS</div><h2 id="stocksVal"></h2></div>
<div class="card"><div>NET WORTH</div><h2 id="netVal"></h2></div>
</div>

<div class="section">
<h3>Assets (Outside Stocks)</h3>

Cash: <input id="cash"><br><br>
Real Estate: <input id="realEstate"><br><br>
Crypto: <input id="crypto"><br><br>
Other: <input id="other"><br><br>

</div>

</div>`;

["cash","realEstate","crypto","other"].forEach(id=>{
document.getElementById(id).oninput=e=>{
extraAssets[id]=+e.target.value||0;
saveAssets();
refresh();
};
});

load();
}

/* ---------- LOAD ---------- */
async function load(){
const {data}=await supabase.from("portfolio").select("*").eq("user_id",user.id);

if(data.length && data[0].extra_assets){
extraAssets=data[0].extra_assets;
}

Object.keys(extraAssets).forEach(k=>{
let el=document.getElementById(k);
if(el) el.value=extraAssets[k];
});

refresh();
}

/* ---------- SAVE ---------- */
async function saveAssets(){
await supabase.from("portfolio").update({
extra_assets:extraAssets
}).eq("user_id",user.id);
}

/* ---------- REFRESH ---------- */
function refresh(){

// simulate stock total (replace with your real total later)
let stockTotal = 10000;

let extraTotal =
extraAssets.cash +
extraAssets.realEstate +
extraAssets.crypto +
extraAssets.other;

let net = stockTotal + extraTotal;

stocksVal.innerText=fmt(stockTotal);
netVal.innerText=fmt(net);
}

/* ---------- INIT ---------- */
showLogin();

});
</script>

</body>
</html>
